<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Propagation Time Machine</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: #e0e0e0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 320px;
            background: #111;
            padding: 20px;
            box-shadow: 3px 0 10px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #sidebar h2 {
            margin: 0;
            font-size: 22px;
            color: #4da3ff;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
        }

        button {
            padding: 12px;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }

        button:hover {
            background: #0a84ff;
        }

        #map {
            flex: 1;
            height: 100%;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>Propagation Time Machine</h2>

        <div>
            <label>Importer un fichier ADIF :</label>
            <input type="file" id="adifFile" accept=".adi,.adif">
        </div>

        <div>
            <label>Date :</label>
            <input type="date" id="dateInput">
        </div>

        <div>
            <label>Bande :</label>
            <select id="bandSelect">
                <option value="">Toutes</option>
                <option value="160m">160m</option>
                <option value="80m">80m</option>
                <option value="40m">40m</option>
                <option value="20m">20m</option>
                <option value="15m">15m</option>
                <option value="10m">10m</option>
            </select>
        </div>

        <div>
            <label>Locator par défaut :</label>
            <input type="text" id="defaultLocator" placeholder="ex: JO20HQ">
        </div>

        <button id="analyzeBtn">Afficher les QSO</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18
        }).addTo(map);

        // Convertit un locator Maidenhead en latitude/longitude
        function locatorToLatLon(locator) {
            locator = locator.toUpperCase();

            if (locator.length < 4) return null;

            const A = 'A'.charCodeAt(0);

            const lon = (locator.charCodeAt(0) - A) * 20 - 180 +
                        parseInt(locator[2]) * 2 +
                        (locator.length >= 6 ? (locator.charCodeAt(4) - A) / 12 : 0);

            const lat = (locator.charCodeAt(1) - A) * 10 - 90 +
                        parseInt(locator[3]) +
                        (locator.length >= 6 ? (locator.charCodeAt(5) - A) / 24 : 0);

            return { lat, lon };
        }

        // Lecture ADIF simple
        function parseADIF(text) {
            const qsos = [];
            const records = text.split(/<eor>/i);

            records.forEach(r => {
                const call = r.match(/<call:\d+>([^<]+)/i);
                const band = r.match(/<band:\d+>([^<]+)/i);
                const grid = r.match(/<gridsquare:\d+>([^<]+)/i);

                if (call) {
                    qsos.push({
                        call: call[1],
                        band: band ? band[1] : "",
                        grid: grid ? grid[1] : null
                    });
                }
            });

            return qsos;
        }

        document.getElementById("analyzeBtn").onclick = async () => {
            const file = document.getElementById("adifFile").files[0];
            const band = document.getElementById("bandSelect").value;
            const defaultLocator = document.getElementById("defaultLocator").value.trim();

            if (!file) {
                alert("Veuillez sélectionner un fichier ADIF.");
                return;
            }

            if (!defaultLocator) {
                alert("Veuillez entrer un locator par défaut (ex: JO20HQ).");
                return;
            }

            const defaultPos = locatorToLatLon(defaultLocator);
            if (!defaultPos) {
                alert("Locator invalide.");
                return;
            }

            const text = await file.text();
            let qsos = parseADIF(text);

            if (band) {
                qsos = qsos.filter(q => q.band === band);
            }

            // Nettoyage des anciens marqueurs
            map.eachLayer(layer => {
                if (layer instanceof L.Marker) {
                    map.removeLayer(layer);
                }
            });

            // Affichage QSO
            qsos.forEach(q => {
                let pos = null;

                if (q.grid) {
                    pos = locatorToLatLon(q.grid);
                }

                if (!pos) {
                    pos = defaultPos;
                }

                L.marker([pos.lat, pos.lon]).addTo(map)
                    .bindPopup(`<b>${q.call}</b><br>Bande : ${q.band}<br>Locator : ${q.grid || defaultLocator}`);
            });
        };
    </script>

</body>
</html>
