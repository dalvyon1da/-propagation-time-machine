<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>QSO ADIF avec synthèse propagation historique</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  body { margin: 0; font-family: Arial,sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; height: 100vh; }
  #sidebar { width: 350px; background: #111; padding: 20px; box-sizing: border-box; overflow: auto; }
  #map { flex: 1; }
  input, button, select { width: 100%; padding: 8px; margin: 5px 0; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box;}
  button,select { cursor: pointer; border-radius: 4px; }
  button { background: #007bff; border:none; }
  button:hover { background: #0a84ff; }
  select { background: #222; }
  .progress-container { display:none; width:100%; background:#222; border-radius:8px; margin:10px 0; }
  .progress-bar { height:20px; background:#4caf50; width:0%; border-radius:8px; text-align:center; color:#000; line-height:20px; font-weight:bold; transition:width 0.2s; }
  #info { margin-top: 5px; color: #bbb; font-size: 13px;}
  .legend { font-size:13px; margin-top:10px; padding:6px; background:#262626; border-radius:6px;}
  .legend span { display:inline-block; width:12px; height:12px; margin-right:6px; border-radius:8px; vertical-align:middle;}
  #propagation-box { background:#23272b; border-radius: 8px; margin:10px 0 10px 0; padding:10px 10px 10px 18px; color:#fff; border-left:6px solid #FFD700;}
  #propagation-box.good { border-left:6px solid #00e676;}
  #propagation-box.medium { border-left:6px solid #FFD700;}
  #propagation-box.bad { border-left:6px solid #ef5350;}
  #propagation-box.undef { border-left:6px solid #999;}
</style>
</head>
<body>

<div id="sidebar">
  <h2>ONLINE CONTEST ANALYSER</h2>
  <h2>BY ON1DA</h2>

  <input type="text" id="qraLocator" placeholder="Entrer le QRA-Locator (ex : JO20DJ)" maxlength="6" autocomplete="off" />
  <input type="file" id="adifFile" accept=".adi,.adif" disabled />
  <button id="analyzeBtn" disabled>Analyser et afficher</button>

  <select id="bandSelect">
    <option value="">Toutes bandes</option>
    <option value="160M">160m</option>
    <option value="80M">80m</option>
    <option value="60M">60m</option>
    <option value="40M">40m</option>
    <option value="30M">30m</option>
    <option value="20M">20m</option>
    <option value="17M">17m</option>
    <option value="15M">15m</option>
    <option value="12M">12m</option>
    <option value="10M">10m</option>
    <option value="6M">6m</option>
    <option value="4M">4m</option>
    <option value="2M">2m</option>
    <option value="70CM">70cm</option>
    <option value="VHF">VHF</option>
    <option value="UHF">UHF</option>
  </select>

  <div id="propagation-box" class="undef">
    <b>Propagation&nbsp;:</b> <span id="propagation-summary">–</span><br>
    <small>
      <b>SFI&nbsp;:</b> <span id="sfi-value">–</span> /
      <b>Kp&nbsp;:</b> <span id="kp-value">–</span> /
      <b>A&nbsp;:</b> <span id="a-value">–</span>
    </small>
  </div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>

  <p id="info"></p>
  <div id="timeline-container" style="margin-top:10px;"></div>

  <div class="legend">
    <b>Couleur par bande :</b><br>
    <span style="background:#800080"></span>160m
    <span style="background:#0000CD"></span>80m
    <span style="background:#00CED1"></span>60m
    <span style="background:#228B22"></span>40m
    <span style="background:#8B4513"></span>30m
    <span style="background:#FFD700"></span>20m
    <span style="background:#FF8C00"></span>17m
    <span style="background:#DC143C"></span>15m
    <span style="background:#FF1493"></span>12m
    <span style="background:#00FF00"></span>10m
    <span style="background:#00FA9A"></span>6m
    <span style="background:#20B2AA"></span>4m
    <span style="background:#1E90FF"></span>2m
    <span style="background:#FF4500"></span>70cm
    <span style="background:#00BFFF"></span>VHF
    <span style="background:#A52A2A"></span>UHF
  </div>
</div>

<div id="map" style="height:100vh;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let kpData = [], aData = [];
const qraInput = document.getElementById('qraLocator');
const adifInput = document.getElementById('adifFile');
const analyzeBtn = document.getElementById('analyzeBtn');
const bandSelect = document.getElementById('bandSelect');
const info = document.getElementById('info');
const progressContainer = document.getElementById('progressContainer');
const progressBar = document.getElementById('progressBar');

function validateLocator(str){return str && str.trim().length >= 4;}
function updateControls(){
  const valid = validateLocator(qraInput.value);
  adifInput.disabled = !valid;
  analyzeBtn.disabled = !(valid && adifInput.files.length>0);
}
qraInput.addEventListener('input', updateControls);
adifInput.addEventListener('change', updateControls);

function locator6ToLatLon(locator){
  if(!locator || locator.length<6) return null;
  locator=locator.toUpperCase();
  const A='A'.charCodeAt(0), zero='0'.charCodeAt(0);
  const lon=(locator.charCodeAt(0)-A)*20-180+(locator.charCodeAt(2)-zero)*2+(locator.charCodeAt(4)-A)*(2/24)+(2/48);
  const lat=(locator.charCodeAt(1)-A)*10-90+(locator.charCodeAt(3)-zero)+(locator.charCodeAt(5)-A)*(1/24)+(1/48);
  return {lat, lon};
}

const map = L.map('map').setView([50.8,4.4],4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18, attribution:'© OpenStreetMap contributors'}).addTo(map);
let starMarker = null;
async function showStarForLocator(locator){
  if(starMarker) map.removeLayer(starMarker);
  let pos=locator6ToLatLon(locator);
  if(!pos) return;
  const starIcon=L.divIcon({
    html:`<svg width="28" height="28" viewBox="0 0 28 28"><polygon points="14,2 17,11 27,11 19,17 22,27 14,21 6,27 9,17 1,11 11,11" fill="#FFD700" stroke="#C0B000" stroke-width="2"/></svg>`,
    className:'', iconSize:[28,28], iconAnchor:[14,14]
  });
  starMarker=L.marker([pos.lat, pos.lon], {icon:starIcon,zIndexOffset:999}).addTo(map);
  map.setView([pos.lat,pos.lon],7);
}
qraInput.addEventListener('change', async () => {
  const val=qraInput.value.trim().toUpperCase();
  if(validateLocator(val)) await showStarForLocator(val);
});

const markersLayer = L.layerGroup().addTo(map);
function getBandColor(band){
  const colors={
    "160M":"#800080","80M":"#0000CD","60M":"#00CED1","40M":"#228B22","30M":"#8B4513",
    "20M":"#FFD700","17M":"#FF8C00","15M":"#DC143C","12M":"#FF1493","10M":"#00FF00",
    "6M":"#00FA9A","4M":"#20B2AA","2M":"#1E90FF","70CM":"#FF4500","VHF":"#00BFFF","UHF":"#A52A2A"
  };
  return colors[band]||"#888888";
}
function displayMarkers(qsos){
  markersLayer.clearLayers();
  let localizedCount=0;
  for(const qso of qsos){
    if(qso.pos){
      localizedCount++;
      L.circleMarker([qso.pos.lat,qso.pos.lon], {radius:6, color:getBandColor(qso.band), fillColor:getBandColor(qso.band), fillOpacity:0.8})
        .addTo(markersLayer)
        .bindPopup(`<b>Call:</b> ${qso.call}<br/><b>Bande:</b> ${qso.band}<br/><b>Date:</b> ${qso.date}<br/><b>Locator:</b> ${qso.locator}`);
    }
  }
  info.textContent=`QSO affichés : ${qsos.length} — QSO géolocalisés : ${localizedCount}`;
  if(starMarker && typeof starMarker.bringToFront==='function') starMarker.bringToFront();
}

function parseADIF(text){
  const qsos=[];
  const records=text.split(/<EOR>/i);
  for(const rec of records){
    const callMatch=rec.match(/<CALL:\s*\d+>\s*([^<\s]+)/i);
    if(!callMatch) continue;
    const bandMatch=rec.match(/<BAND:\s*\d+>\s*([^<\s]+)/i);
    const dateMatch=rec.match(/<QSO_DATE:\s*\d+>\s*(\d{8})/i);
    const timeMatch=rec.match(/<TIME_ON:\s*\d+>\s*(\d{4})/i);
    qsos.push({
      call: callMatch[1].trim().toUpperCase(),
      band: bandMatch ? bandMatch[1].trim().toUpperCase() : 'N/A',
      date: dateMatch ? dateMatch[1].trim() : 'N/A',
      time: timeMatch ? timeMatch[1].trim() : '0000'
    });
  }
  return qsos;
}

function formatQSODateTime(qso){
  let time=qso.time || "0000";
  let h=parseInt(time.substring(0,2)), m=parseInt(time.substring(2,4));
  return new Date(`${qso.date.substring(0,4)}-${qso.date.substring(4,6)}-${qso.date.substring(6,8)}T${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:00Z`);
}

let timelineQSOs=[], timelineInterval=null;

function buildTimelineQSOs(qsos){
  for(const q of qsos) q.datetime=formatQSODateTime(q);
  timelineQSOs=qsos.slice().sort((a,b)=>a.datetime-b.datetime);
}

function computePropagationState(kp, band){
  kp=Number(kp);
  if(isNaN(kp))return {synth:"Indéterminée",colorClass:"undef"};
  if(!band||["160M","80M","60M","40M","30M","20M","17M","15M","12M","10M"].includes(band)){
    if(kp<3)return {synth:"Bonne",colorClass:"good"};
    if(kp<5)return {synth:"Moyenne",colorClass:"medium"};
    return {synth:"Mauvaise",colorClass:"bad"};
  } else if(["6M","4M","2M","70CM","VHF","UHF"].includes(band)){
    if(kp<2)return {synth:"Bonne",colorClass:"good"};
    if(kp<5)return {synth:"Moyenne",colorClass:"medium"};
    return {synth:"Mauvaise",colorClass:"bad"};
  }
  return {synth:"Indéterminée",colorClass:"undef"};
}

function getKpAForDate(dateStr) {
  const foundKp = kpData.find(row => row.date.replace(/-/g,'').replace(/T.*/,'') === dateStr);
  const foundA = aData.find(row => row.date.replace(/-/g,'').replace(/T.*/,'') === dateStr);
  return {
    kp: foundKp ? foundKp.kp : null,
    a: foundA ? foundA.a : null
  };
}

async function updatePropagationBoxForCurrentSelectionAndBand(dateStr, band){
  const { kp, a } = getKpAForDate(dateStr);
  // SFI non dispo API - laisse "–"
  document.getElementById("sfi-value").textContent = "–";
  document.getElementById("kp-value").textContent = kp!=null ? kp : "–";
  document.getElementById("a-value").textContent = a!=null ? a : "–";
  const {synth,colorClass}=computePropagationState(kp,band);
  document.getElementById("propagation-box").className=colorClass;
  document.getElementById("propagation-summary").textContent=synth;
}

// Timeline et navigation
const timelineContainer=document.getElementById("timeline-container");
timelineContainer.innerHTML=`
  <label><b>Concours timeline :</b> <span id="timelineLabel"></span></label>
  <input type="range" min="0" max="0" value="0" id="timelineRange" step="1" style="width:90%" />
  <button id="playBtn">▶</button>
  <button id="pauseBtn">⏸</button>
`;

const timelineRange=document.getElementById("timelineRange");
const playBtn=document.getElementById("playBtn");
const pauseBtn=document.getElementById("pauseBtn");

async function updateTimelineMap(idx){
  if(typeof idx!=="number") idx=0;
  const curQSO=timelineQSOs[idx];
  if(!curQSO) return;
  document.getElementById('timelineLabel').textContent=curQSO.datetime.toISOString().substring(0,16).replace('T',' ');
  let visible=timelineQSOs.slice(0,idx+1);
  const band=bandSelect.value;
  if(band){
    if(band==="VHF") visible=visible.filter(q=>["2M","4M","6M"].includes(q.band));
    else if(band==="UHF") visible=visible.filter(q=>["70CM"].includes(q.band));
    else visible=visible.filter(q=>q.band===band);
  }
  displayMarkers(visible);
  if(curQSO.date) await updatePropagationBoxForCurrentSelectionAndBand(curQSO.date, band);
}

timelineRange.addEventListener("input", async()=>{await updateTimelineMap(Number(timelineRange.value));});
bandSelect.addEventListener("change", async()=>{await updateTimelineMap(Number(timelineRange.value));});

playBtn.addEventListener("click", ()=>{
  if(timelineInterval) clearInterval(timelineInterval);
  timelineInterval=setInterval(async()=>{
    const idx=Number(timelineRange.value);
    if(idx<timelineQSOs.length-1){
      timelineRange.value=idx+1;
      await updateTimelineMap(idx+1);
    } else {clearInterval(timelineInterval);}
  },900);
});
pauseBtn.addEventListener("click", ()=>{
  if(timelineInterval) clearInterval(timelineInterval);
});

async function getKpAData(minDate, maxDate) {
  // Dates au format YYYY-MM-DD
  const start = minDate + "T00:00:00Z";
  const end   = maxDate + "T23:59:59Z";
  // Récupère l'index Kp
  let response = await fetch(`https://kp.gfz.de/app/json/?start=${start}&end=${end}&index=Kp&status=def`);
  kpData = await response.json();
  // Récupère l'index "a" si tu veux aussi l'afficher : index=a
  response = await fetch(`https://kp.gfz.de/app/json/?start=${start}&end=${end}&index=a&status=def`);
  aData = await response.json();
}

// Fonction principale
let allQSOs = [];
analyzeBtn.addEventListener("click",async()=>{
  const qraLocator=qraInput.value.trim().toUpperCase();
  if(!validateLocator(qraLocator)){
    alert("Merci d’entrer un QRA-locator valide.");
    return;
  }
  await showStarForLocator(qraLocator);
  info.textContent="";
  progressContainer.style.display="block";
  progressBar.style.width="0%";
  progressBar.textContent="0%";
  markersLayer.clearLayers();
  map.setView(locator6ToLatLon(qraLocator)||[50.8,4.4],6);

  const text=await adifInput.files[0].text();
  const qsos=parseADIF(text);
  allQSOs=[];
  let minDate="99999999", maxDate="00000000";
  // première passe pour dates min/max
  for(const qso of qsos) {
    if(qso.date < minDate) minDate = qso.date;
    if(qso.date > maxDate) maxDate = qso.date;
  }
  // Formatage YYYY-MM-DD
  minDate = `${minDate.substr(0,4)}-${minDate.substr(4,2)}-${minDate.substr(6,2)}`;
  maxDate = `${maxDate.substr(0,4)}-${maxDate.substr(4,2)}-${maxDate.substr(6,2)}`;

  await getKpAData(minDate, maxDate);

  for(let i=0;i<qsos.length;i++){
    const qso=qsos[i];
    // Option: ignore la géoloc spotHole pour aller plus vite sinon garde getSpotHoleData etc.
    qso.locator = qso.locator || qraLocator;
    qso.pos = locator6ToLatLon(qso.locator) || null;
    allQSOs.push(qso);

    const pct=Math.round(100*(i+1)/qsos.length);
    progressBar.style.width=pct+"%";
    progressBar.textContent=pct+"%";

    await new Promise(r=>setTimeout(r,20));
  }

  progressContainer.style.display="none";
  buildTimelineQSOs(allQSOs);
  timelineRange.min=0;
  timelineRange.max=allQSOs.length-1;
  timelineRange.value=0;
  await updateTimelineMap(0);
});

// Initial état boite propagation
document.getElementById("sfi-value").textContent = "–";
document.getElementById("kp-value").textContent = "–";
document.getElementById("a-value").textContent = "–";
document.getElementById("propagation-summary").textContent = "–";
document.getElementById("propagation-box").className = "undef";
</script>
</body>
</html>
