<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Analyse QSO ADIF + Propagation KP/AP - Ground Zero</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body { margin:0; font-family: Arial,sans-serif; background:#262626; color:#ebebeb; display:flex; height:100vh;}
    #sidebar { width:320px; background:#181818; padding:18px; box-sizing:border-box; overflow:auto; }
    #map { flex:1; min-height:100vh; }
    h2 {margin-top:0;}
    input,button,select { width:100%; padding:7px; margin:8px 0; border-radius:5px; border:1px solid #444; background:#222; color:#eee; }
    button {background:#0955ee; font-weight:bold;}
    button:hover {background:#197df5;}
    #info { color:#949fff; margin:8px 0 0 0; font-size:13px; }
    table { width:100%; background:#212121; border-radius:8px; font-size:13px; margin-top:10px;}
    th,td {padding:3px 6px;}
    th {background:#183052;}
    tr:nth-child(even) { background:#232a31; }
    #propagationBlock {margin-top:22px; padding:10px; border-radius:7px; background:#242b2e;}
    #timeline-box {margin-top:22px; padding:10px 5px; background:#21232a; border-radius:7px;}
  </style>
</head>
<body>
<div id="sidebar">
  <h2>Analyse QSO & Propagation</h2>
  
  <input type="file" id="adifFile" accept=".adi,.adif"/>
  <button id="analyzeBtn">Analyser ADIF</button>
  <div id="info">Importer un fichier ADIF pour commencer.</div>

  <div id="timeline-box" style="display:none;">
    <label><b>Timeline QSO&nbsp;:</b> <span id="timelineLabel"></span></label><br>
    <input type="range" min="0" max="0" value="0" id="timelineRange" style="width:80%;">
    <button id="playBtn">▶</button>
    <button id="pauseBtn">⏸</button>
  </div>

  <div id="propagationBlock">
    <h3>Propagation Kp / Ap</h3>
    <div id="propagationStatus" style="font-size:14px;">Non analysé</div>
  </div>

  <table id="qsoTable" style="display:none;">
    <thead><tr>
      <th>#</th><th>Indicatif</th><th>Bande</th><th>Date</th><th>Locator</th>
    </tr></thead>
    <tbody></tbody>
  </table>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ────────────── MAP
const map = L.map('map').setView([48.8,2.2],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom: 18
}).addTo(map);

const markersLayer = L.layerGroup().addTo(map);


//────────────── ADIF PARSING
function parseADIF(text) {
  const qsos = [];
  const records = text.split(/<eor>/ig);
  for(const rec of records) {
    // Recherche souple en ignorant la casse
    const callm = rec.match(/<call:(\d+)>([A-Z0-9/]+)/i);
    const bandm = rec.match(/<band:(\d+)>([0-9a-zA-Z]+)/i);
    const datem = rec.match(/<qso_date:(\d+)>(\d{8})/i);
    const timem = rec.match(/<time_on:(\d+)>(\d{4,6})/i);
    const gridm = rec.match(/<gridsquare:(\d+)>([A-Ra-r0-9]{4,6})/i);

    qsos.push({
      call:callm?callm[2].toUpperCase():"?",
      band:bandm?bandm[2].toUpperCase():"?",
      date:datem?datem[2]:"",
      time:timem?timem[2]:"0000",
      locator:gridm?gridm[2].toUpperCase():""
    });
  }
  return qsos.filter(q=>q.call && q.date);
}

//────────────── GRIDSQUARE→LAT/LON
function locator6ToLatLon(locator) {
  if(!locator||locator.length<4) return null;
  locator=locator.toUpperCase();
  const A='A'.charCodeAt(0);
  let lon=(locator.charCodeAt(0)-A)*20-180+parseInt(locator[2],10)*2+1;
  let lat=(locator.charCodeAt(1)-A)*10-90+parseInt(locator[3],10)+0.5;
  if(locator.length>=6) {
    lon += (locator.charCodeAt(4)-A)*(2/24)+(2/48);
    lat += (locator.charCodeAt(5)-A)*(1/24)+(1/48);
  }
  return {lat,lon};
}

//────────────── Kp/Ap - Fetch & Map (GFZ)
async function fetchKpApGFZ() {
  const url = 'https://www-app3.gfz-potsdam.de/kp_index/Kp_ap_since_1932.txt';
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Erreur HTTP ${response.status}`);

    const text = await response.text();

    const lines = text.split('\n').filter(l => l.trim() && !l.startsWith('#'));
    const dataMap = new Map();

    for(const line of lines) {
      const cols = line.trim().split(/\s+/);
      if(cols.length < 20) continue;
      const year = cols[0];
      const month = cols[1].padStart(2,'0');
      const day = cols[2].padStart(2,'0');
      const dateKey = `${year}-${month}-${day}`;
      const dailyKp = parseFloat(cols[18]);
      const dailyAp = parseFloat(cols[19]);
      if(isNaN(dailyKp) || isNaN(dailyAp)) continue;
      dataMap.set(dateKey, {Kp: dailyKp, Ap: dailyAp});
    }
    return dataMap;
  } catch(e) {
    console.error("Erreur fetchKpApGFZ:", e);
    return null;
  }
}

//────────────── Timeline, Table & Markers
let timelineQSOs=[], timelineInterval=null;
const timelineRange = document.getElementById('timelineRange');
const timelineLabel = document.getElementById('timelineLabel');
const playBtn = document.getElementById('playBtn');
const pauseBtn = document.getElementById('pauseBtn');

function buildTimelineQSOs(qsos) {
  for(const q of qsos){
    let time=q.time.padEnd(4,'0');
    let h=parseInt(time.substring(0,2)), m=parseInt(time.substring(2,4));
    q.datetime = new Date(`${q.date.substring(0,4)}-${q.date.substring(4,6)}-${q.date.substring(6,8)}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00Z`);
  }
  timelineQSOs = qsos.slice().sort((a,b)=>a.datetime-b.datetime);

  timelineRange.min = 0;
  timelineRange.max = Math.max(0, timelineQSOs.length-1);
  timelineRange.value = 0;

  updateTimelineMap();
}

function updateTimelineMap() {
  if (!timelineQSOs.length) return;
  let idx = Number(timelineRange.value)||0;
  let qso = timelineQSOs[idx];
  timelineLabel.textContent = qso.datetime.toISOString().replace('T',' ').substring(0,16);

  let qsosToShow = timelineQSOs.slice(0, idx+1);
  markersLayer.clearLayers();
  for(const qq of qsosToShow) {
    let pos = locator6ToLatLon(qq.locator);
    if(pos)
      L.circleMarker([pos.lat,pos.lon], {
        radius:6,
        color:"#ffec48",
        fillColor:"#e37e07",
        fillOpacity:0.7
      }).addTo(markersLayer).bindPopup(`<b>${qq.call}</b> (${qq.band})<br>Date: ${qq.date}<br>Grid: ${qq.locator}`);
  }
  if(qsosToShow.length) 
    map.setView(locator6ToLatLon(qsosToShow[qsosToShow.length-1].locator) || [48.8,2.2], 6);

  // Table update
  const tb = document.querySelector('#qsoTable tbody');
  tb.innerHTML = '';
  qsosToShow.forEach((q,idx) => {
    tb.innerHTML += `<tr>
      <td>${idx+1}</td>
      <td>${q.call}</td>
      <td>${q.band}</td>
      <td>${q.date}</td>
      <td>${q.locator}</td>
    </tr>`;
  });
}

playBtn.onclick = () => {
  if (timelineInterval) clearInterval(timelineInterval);
  timelineInterval = setInterval(() => {
    let idx = Number(timelineRange.value);
    if (idx < timelineQSOs.length-1) {
      timelineRange.value = idx+1;
      updateTimelineMap();
    } else {
      clearInterval(timelineInterval);
    }
  }, 600);
};
pauseBtn.onclick = () => {
  if (timelineInterval) clearInterval(timelineInterval);
};
timelineRange.oninput = updateTimelineMap;

//────────────── Propagation
function displayPropagationFromQSOs(qsos) {
  const box = document.getElementById("propagationStatus");
  if(!qsos.length){
    box.textContent = "Aucune donnée QSO.";
    box.style.color = "gray";
    return;
  }
  const valid = qsos.filter(q=>q.Kp!==undefined && !isNaN(q.Kp));
  if(!valid.length) {
    box.textContent = "Pas de données Kp/Ap valides.";
    box.style.color = "orange";
    return;
  }
  const avgKp = valid.reduce((acc,q)=>acc+q.Kp,0) / valid.length;
  const avgAp = valid.reduce((acc,q)=>acc+q.Ap,0) / valid.length;
  let stat = avgKp<=2 ? ["Bonne propagation","lime"] : avgKp<=4 ? ["Propagation moyenne","orange"] : ["Mauvaise propagation","red"];
  box.innerHTML = `<b>Kp moyen :</b> ${avgKp.toFixed(2)}&nbsp;&nbsp;<b>Ap moyen :</b> ${avgAp.toFixed(2)}<br><b>${stat[0]}</b>`;
  box.style.color = stat[1];
}

//────────────── Analyse (bouton)
document.getElementById('analyzeBtn').onclick = async () => {
  const input = document.getElementById('adifFile');
  const info = document.getElementById('info');
  const qsoTable = document.getElementById('qsoTable');
  const timelineBox = document.getElementById('timeline-box');
  if(!input.files.length) {
    info.textContent = "Veuillez choisir un fichier ADIF.";
    return;
  }
  info.textContent = "Chargement du log...";
  const text = await input.files[0].text();
  let qsos = parseADIF(text);

  if(!qsos.length) {
    info.textContent = "Aucun QSO détecté dans ce fichier.";
    return;
  }
  info.textContent = `QSOs détectés : ${qsos.length}. Récupération des indices Kp/Ap...`;

  // Kp/Ap
  const kpApMap = await fetchKpApGFZ();
  for(const qso of qsos){
    if(qso.date && kpApMap){
      const dateKey = `${qso.date.substring(0,4)}-${qso.date.substring(4,6)}-${qso.date.substring(6,8)}`;
      const ind = kpApMap.get(dateKey);
      if(ind) { qso.Kp = ind.Kp; qso.Ap = ind.Ap; }
    }
  }
  // Timeline, table, propagation
  qsoTable.style.display = "block";
  timelineBox.style.display = "block";
  buildTimelineQSOs(qsos);
  displayPropagationFromQSOs(qsos);
  info.textContent = `${qsos.length} QSO analysés.`;
}
</script>
</body>
</html>
