function extractDatesFromQSOs(qsos) {
  const dates = qsos
    .map(q => q.date)
    .filter(d => d && d !== "N/A");
  if (dates.length === 0) return null;
  dates.sort();
  return {
    min: `${dates[0].substring(0,4)}-${dates[0].substring(4,6)}-${dates[0].substring(6,8)}`,
    max: `${dates[dates.length-1].substring(0,4)}-${dates[dates.length-1].substring(4,6)}-${dates[dates.length-1].substring(6,8)}`
  };
}

async function fetchPropagationJson(minDate, maxDate) {
  const url = `https://kp.gfz.de/app/json/?start=${minDate}T00:00:00Z&end=${maxDate}T23:59:59Z&index=Kp,C9,Ap&status=def`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status+" API");
    const data = await r.json();
    const len = data.Kp?.length || 0;
    if (len === 0) return null;
    // K = C9, Kp, A = Ap
    return {
      K: data.C9?.[len-1] ?? "?",
      Kp: data.Kp?.[len-1] ?? "?",
      A: data.Ap?.[len-1] ?? "?"
    };
  } catch(e) { console.error("Erreur propagation :", e); return null; }
}

function evaluatePropagation(kp) {
  if (isNaN(kp)) return {text: "État inconnu", color: "gray"};
  if (kp <= 2) return {text: "Bonne propagation", color: "lime"};
  if (kp <= 4) return {text: "Propagation moyenne", color: "orange"};
  return {text: "Mauvaise propagation", color: "red"};
}

function displayPropagation(data) {
  const box = document.getElementById("propagationStatus");
  if (!data) {
    box.innerHTML = "Impossible de récupérer les indices.";
    box.style.color = "red";
    return;
  }
  const K = data.K ?? "?";
  const Kp = data.Kp ?? "?";
  const A = data.A ?? "?";
  const evalP = evaluatePropagation(parseFloat(Kp));
  box.innerHTML = `
    <b>K :</b> ${K}<br>
    <b>Kp :</b> ${Kp}<br>
    <b>A :</b> ${A}<br>
    <span style="color:${evalP.color};font-weight:bold">${evalP.text}</span>
  `;
  box.style.color = evalP.color;
}
