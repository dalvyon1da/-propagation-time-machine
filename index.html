<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test ADIF brut</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <style>
        body { margin:0; font-family:Arial; background:#1e1e1e; color:#e0e0e0; display:flex; height:100vh; }
        #sidebar { width:350px; background:#111; padding:20px; overflow:auto; }
        #map { flex:1; }
        table { width:100%; border-collapse:collapse; font-size:12px; }
        th, td { border:1px solid #444; padding:3px 5px; }
        input, button { width:100%; padding:8px; margin:5px 0; background:#222; border:1px solid #444; color:#fff; }
        button { cursor:pointer; background:#007bff; }
        button:hover { background:#0a84ff; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Test ADIF brut</h2>

    <input type="file" id="adifFile" accept=".adi,.adif">
    <button id="analyzeBtn">Analyser</button>

    <p id="info"></p>

    <table id="qsoTable">
        <thead>
            <tr><th>#</th><th>CALL</th><th>BAND</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([50.8, 4.4], 3);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// PARSEUR MINIMAL : basé uniquement sur <CALL>, <BAND>
function parseADIF(text) {
    const qsos = [];
    const regex = /<call[^>]*>\s*([^<\s]+)/gi;
    let match, positions = [];

    while ((match = regex.exec(text)) !== null)
        positions.push({ index: match.index, call: match[1].trim() });

    if (positions.length === 0) return qsos;
    positions.push({ index: text.length });

    for (let i=0; i<positions.length-1; i++) {
        const block = text.slice(positions[i].index, positions[i+1].index);
        const call = positions[i].call;
        const band = (block.match(/<band[^>]*>\s*([^<\s]+)/i) || [,""])[1];
        qsos.push({ call, band });
    }
    return qsos;
}

document.getElementById("analyzeBtn").onclick = async () => {
    const file = document.getElementById("adifFile").files[0];
    if (!file) { alert("Choisis un fichier ADIF"); return; }

    const text = await file.text();
    const qsos = parseADIF(text);

    // 1) Info + table
    document.getElementById("info").textContent = `QSO détectés : ${qsos.length}`;
    const tbody = document.querySelector("#qsoTable tbody");
    tbody.innerHTML = "";
    qsos.forEach((q, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${i+1}</td><td>${q.call}</td><td>${q.band}</td>`;
        tbody.appendChild(tr);
    });

    // 2) Carte : un point fixe pour chaque QSO (JO20HQ ≈ 50.8, 4.4)
    map.eachLayer(l => { if (l instanceof L.Marker) map.removeLayer(l); });
    qsos.forEach(() => {
        L.circleMarker([50.8, 4.4], { radius:3, color:"red" }).addTo(map);
    });

    console.log("QSO parsés :", qsos);
};
</script>

</body>
</html>
