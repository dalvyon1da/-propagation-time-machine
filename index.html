<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>QSO ADIF avec indices Kp GFZ live</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  body { margin:0; font-family: Arial, sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; height: 100vh; }
  #sidebar { width: 350px; background: #111; padding: 20px; box-sizing: border-box; overflow: auto; }
  #map { flex: 1; }
  input, button, select { width: 100%; padding: 8px; margin: 5px 0; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
  button, select { cursor: pointer; border-radius: 4px; }
  button { background: #007bff; }
  button:hover { background: #0a84ff; }
  select { background: #222; }
  .progress-container { display: none; width: 100%; background: #222; border-radius: 8px; margin: 10px 0; }
  .progress-bar { height: 20px; background: #4caf50; width: 0%; border-radius: 8px; text-align: center; color: #000; line-height: 20px; font-weight: bold; }
  #info { margin-top: 5px; color: #bbb; font-size: 13px; }
  #timeline-container { margin-top: 10px; }
  #propagation-box {
    background: #23272b; border-radius: 8px; margin:12px 0; padding: 10px 15px; color: #eee; border-left: 6px solid #FFD700;
    font-size: 13px;
  }
  #propagation-box.good  { border-left-color: #00e676; }
  #propagation-box.medium{ border-left-color: #FFD700; }
  #propagation-box.bad   { border-left-color: #ef5350; }
  #propagation-box.undef { border-left-color: #999; }
  .legend {
    font-size: 13px; margin-top: 10px; padding: 6px; background: #262626; border-radius: 6px;
  }
  .legend span { display: inline-block; width: 16px; height: 16px; margin-right: 6px; border-radius: 50%; vertical-align: middle;}
  .legend .good { background-color: #00e676; }
  .legend .medium { background-color: #FFD700; }
  .legend .bad { background-color: #ef5350; }
</style>
</head>
<body>
<div id="sidebar">
  <h2>CONTEST ANALYSE BY ON1DA</h2>
  <input type="text" id="qraLocator" placeholder="Entrer le QRA-Locator de la station (ex : JO20DJ)" maxlength="6" autocomplete="off" />
  <input type="file" id="adifFile" accept=".adi,.adif" disabled />
  <button id="analyzeBtn" disabled>Analyser et afficher</button>
  <select id="bandSelect">
    <option value="">Toutes bandes</option>
    <option value="160M">160m</option>
    <option value="80M">80m</option>
    <option value="60M">60m</option>
    <option value="40M">40m</option>
    <option value="30M">30m</option>
    <option value="20M">20m</option>
    <option value="17M">17m</option>
    <option value="15M">15m</option>
    <option value="12M">12m</option>
    <option value="10M">10m</option>
    <option value="6M">6m</option>
    <option value="4M">4m</option>
    <option value="2M">2m</option>
    <option value="70CM">70cm</option>
    <option value="VHF">VHF</option>
    <option value="UHF">UHF</option>
  </select>
  <div id="propagation-box" class="undef">
    Indices propagation GFZ Kp : <strong><span id="kp-value">–</span></strong>
    <span id="kp-status"></span>
  </div>
  
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>
  
  <p id="info"></p>
  
  <div id="timeline-container"></div>
  
  <div class="legend">
    <span class="good"></span>Bonne (Kp &lt; 3)<br/>
    <span class="medium"></span>Moyenne (Kp 3-5)<br/>
    <span class="bad"></span>Mauvaise (Kp &gt;= 5)
  </div>
</div>
<div id="map" style="height:100vh;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// Ton code existant de gestion ADIF, carte, timeline, etc.
// ...

// Nouvelle fonction pour récupérer Kp GFZ en JSON par date et afficher dans la colonne
async function fetchKpGFZ(dateStr) {
  const url = `https://kp.gfz.de/kpdata?startdate=${dateStr}&enddate=${dateStr}&format=json`;
  try {
    const resp = await fetch(url);
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    if(json && json.result && json.result.length>0){
      // Retourne la moyenne kpindex du jour (exemple)
      return parseFloat(json.result[0].kpindex);
    }
    return null;
  } catch(e) {
    console.error('Erreur récupération Kp GFZ:', e);
    return null;
  }
}

// Mise à jour de la zone propagation avec valeur et couleur
function updatePropagationBoxWithKp(kp){
  const kpValElem = document.getElementById('kp-value');
  const kpStatusElem = document.getElementById('kp-status');
  const box = document.getElementById('propagation-box');
  kpValElem.textContent = (kp !== null) ? kp.toFixed(1) : '–';
  let status = 'Indéterminée';
  let className = 'undef';
  if(kp !== null) {
    if(kp < 3) { status = 'Bonne'; className='good'; }
    else if(kp <5) { status = 'Moyenne'; className='medium'; }
    else { status = 'Mauvaise'; className='bad'; }
  }
  kpStatusElem.textContent = ' (' + status + ')';
  box.className = className;
}

// Fonction pour formater la date AAAAMMJJ en YYYY-MM-DD
function formatDateForKp(dateStr) {
  if(!dateStr || dateStr.length !== 8) return null;
  return `${dateStr.substring(0,4)}-${dateStr.substring(4,6)}-${dateStr.substring(6,8)}`;
}

// Intégration avec la timeline : au changement d’index on met à jour l’interface et appelle fetchKpGFZ
async function onTimelineChange(currentDate){
  const dateFormatted = formatDateForKp(currentDate);
  if(dateFormatted){
    const kp = await fetchKpGFZ(dateFormatted);
    updatePropagationBoxWithKp(kp);
  } else {
    updatePropagationBoxWithKp(null);
  }
}

// Exemple d’appel après que timelineQSOs soit rempli et timelineRange positionné
async function updateTimelineMap() {
  const idx = Number(timelineRange.value) || 0;
  const curQSO = timelineQSOs[idx];
  if(!curQSO) return;
  timelineLabel.textContent = curQSO.datetime.toISOString().slice(0,16).replace("T"," ");
  
  // Filtrer QSOs selon curseur et bande
  // (ton code existant)
  
  // Mise à jour propagation
  await onTimelineChange(curQSO.date);
}

// Dans ton analyse bouton tu dois t’assurer que after buildTimelineQSOs(...) tu initialises ta timeline avec updateTimelineMap et lance la mise à jour propagation

</script>
</body>
</html>
