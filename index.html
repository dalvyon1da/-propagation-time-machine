<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Analyse QSO ADIF avec indices propagation GFZ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  body { margin:0; font-family: Arial, sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; height: 100vh; }
  #sidebar { width: 350px; background: #111; padding: 20px; box-sizing: border-box; overflow: auto; }
  #map { flex: 1; }
  input, button, select { width: 100%; padding: 8px; margin: 5px 0; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
  button, select { cursor: pointer; border-radius: 4px; }
  button { background: #007bff; }
  button:hover { background: #0a84ff; }
  select { background: #222; }
  .progress-container { display: none; width: 100%; background: #222; border-radius: 8px; margin: 10px 0; }
  .progress-bar { height: 20px; background: #4caf50; width: 0%; border-radius: 8px; text-align: center; color: #000; line-height: 20px; font-weight: bold; }
  #info { margin-top: 5px; color: #bbb; font-size: 13px; }
  #timeline-container { margin-top: 10px; }
  #propagation-box {
    background: #23272b; border-radius: 8px; margin:12px 0; padding: 10px 15px; color: #eee; border-left: 6px solid #FFD700;
    font-size: 13px;
  }
  #propagation-box.good  { border-left-color: #00e676; }
  #propagation-box.medium{ border-left-color: #FFD700; }
  #propagation-box.bad   { border-left-color: #ef5350; }
  #propagation-box.undef { border-left-color: #999; }
  .legend {
    font-size: 13px; margin-top: 10px; padding: 6px; background: #262626; border-radius: 6px;
  }
  .legend span { display: inline-block; width: 16px; height: 16px; margin-right: 6px; border-radius: 50%; vertical-align: middle;}
  .legend .good { background-color: #00e676; }
  .legend .medium { background-color: #FFD700; }
  .legend .bad { background-color: #ef5350; }
</style>
</head>
<body>
<div id="sidebar">
  <h2>CONTEST ANALYSE BY ON1DA</h2>
  <input type="text" id="qraLocator" placeholder="Entrer le QRA-Locator de la station (ex : JO20DJ)" maxlength="6" autocomplete="off" />
  <input type="file" id="adifFile" accept=".adi,.adif" disabled />
  <button id="analyzeBtn" disabled>Analyser et afficher</button>
  <select id="bandSelect">
    <option value="">Toutes bandes</option>
    <option value="160M">160m</option>
    <option value="80M">80m</option>
    <option value="60M">60m</option>
    <option value="40M">40m</option>
    <option value="30M">30m</option>
    <option value="20M">20m</option>
    <option value="17M">17m</option>
    <option value="15M">15m</option>
    <option value="12M">12m</option>
    <option value="10M">10m</option>
    <option value="6M">6m</option>
    <option value="4M">4m</option>
    <option value="2M">2m</option>
    <option value="70CM">70cm</option>
    <option value="VHF">VHF</option>
    <option value="UHF">UHF</option>
  </select>

  <!-- Zone Propagation -->
  <div id="propagation-box" class="undef">
    Indices propagation GFZ Kp : <strong><span id="kp-value">–</span></strong>
    <span id="kp-status"></span>
  </div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>
  <p id="info"></p>

  <div id="timeline-container"></div>

  <div class="legend">
    <span class="good"></span>Bonne (Kp &lt; 3)<br/>
    <span class="medium"></span>Moyenne (Kp 3-5)<br/>
    <span class="bad"></span>Mauvaise (Kp &gt;= 5)
  </div>
</div>
<div id="map" style="height: 100vh;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([50.8, 4.4], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom: 18,
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

const qraLocatorInput = document.getElementById('qraLocator');
const adifFile = document.getElementById('adifFile');
const analyzeBtn = document.getElementById('analyzeBtn');
const bandSelect = document.getElementById('bandSelect');
const info = document.getElementById('info');
const progressContainer = document.getElementById('progressContainer');
const progressBar = document.getElementById('progressBar');
const markersLayer = L.layerGroup().addTo(map);
const propagationBox = document.getElementById('propagation-box');
const kpValueSpan = document.getElementById('kp-value');
const kpStatusSpan = document.getElementById('kp-status');

let allQSOs = [];
let timelineQSOs = [];
let timelineInterval = null;

// Helpers
function getBandColor(band){
  const colors = {
    "160M": "#800080","80M": "#0000CD","60M": "#00CED1",
    "40M": "#228B22","30M": "#8B4513","20M": "#FFD700",
    "17M": "#FF8C00","15M": "#DC143C","12M": "#FF1493",
    "10M": "#00FF00","6M": "#00FA9A","4M": "#20B2AA",
    "2M": "#1E90FF","70CM": "#FF4500","VHF": "#00BFFF","UHF": "#A52A2A"
  };
  return colors[band] || "#888888";
}

function validateLocator(str) {
  return str && str.trim().length >= 4;
}

qraLocatorInput.addEventListener('input', () => {
  if(validateLocator(qraLocatorInput.value)){
    adifFile.disabled = false;
    analyzeBtn.disabled = !adifFile.files.length;
  } else {
    adifFile.disabled = true;
    analyzeBtn.disabled = true;
  }
});
adifFile.addEventListener('change', () => {
  analyzeBtn.disabled = !adifFile.files.length || !validateLocator(qraLocatorInput.value);
});

// Parsing ADIF simple
function parseADIF(text){
  const qsos = [];
  const records = text.split(/<EOR>/i);
  records.forEach(rec => {
    const callMatch = rec.match(/<CALL:\s*\d+>\s*([^<\s]+)/i);
    if(!callMatch) return;
    const bandMatch = rec.match(/<BAND:\s*\d+>\s*([^<\s]+)/i);
    const dateMatch = rec.match(/<QSO_DATE:\s*\d+>\s*(\d{8})/i);
    const timeMatch = rec.match(/<TIME_ON:\s*\d+>\s*(\d{4})/i);
    qsos.push({
      call: callMatch[1].toUpperCase(),
      band: bandMatch ? bandMatch[1].toUpperCase() : "N/A",
      date: dateMatch ? dateMatch[1] : "N/A",
      time: timeMatch ? timeMatch[1] : "0000"
    });
  });
  return qsos;
}

// Convertir date et heure QSO en Date js
function formatQSODateTime(qso){
  let time = qso.time || "0000";
  let hour = time.substring(0,2);
  let min = time.substring(2,4);
  let dateStr = `${qso.date.substring(0,4)}-${qso.date.substring(4,6)}-${qso.date.substring(6,8)}`;
  return new Date(`${dateStr}T${hour}:${min}:00Z`);
}

// Afficher les QSOs sur la carte
function displayMarkers(filtered){
  markersLayer.clearLayers();
  filtered.forEach(qso => {
    if(qso.pos){
      L.circleMarker([qso.pos.lat, qso.pos.lon],{
        radius:6,
        color: getBandColor(qso.band),
        fillColor: getBandColor(qso.band),
        fillOpacity:0.8
      }).addTo(markersLayer).bindPopup(
        `<b>Call:</b> ${qso.call}<br><b>Bande:</b> ${qso.band}<br><b>Date:</b> ${qso.date}<br><b>Locator:</b> ${qso.locator}`
      );
    }
  });
  info.textContent = `QSO affichés : ${filtered.length}`;
}

// Extraire plage de dates pour construire lien GFZ KP
function formatDateForGFZ(dateStr) {
  if(!dateStr || dateStr.length!==8) return null;
  return `${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}`;
}
function buildGFZKpUrl(qsos){
  if(!qsos.length) return null;
  const dates = [...new Set(qsos.map(q=>q.date))].sort();
  const start = formatDateForGFZ(dates[0]);
  const end = formatDateForGFZ(dates[dates.length-1]);
  if(!start || !end) return null;
  return `https://kp.gfz.de/kpdata?startdate=${start}&enddate=${end}&format=kp1#kpdatadownload-143`;
}

// Mise à jour encadré propagation avec lien
function updatePropagationBox(qsos){
  const url = buildGFZKpUrl(qsos);
  const box = document.getElementById("propagation-box");
  if(url){
    box.innerHTML = `<b>Indices propagation GFZ Kp :</b><br><a href="${url}" target="_blank" style="color:#4caf50; word-break: break-word;">${url}</a>`;
  } else {
    box.innerHTML = `<b>Indices propagation GFZ Kp :</b><br>Pas de données disponibles`;
  }
}

// Variables timeline
const timelineContainer = document.getElementById('timeline-container');
let timelineQSOs = [];
let timelineRange, timelineLabel, playBtn, pauseBtn, timelineInterval = null;

// Création timeline UI
function createTimelineUI(){
  timelineContainer.innerHTML = `
    <label><b>Concours timeline :</b> <span id="timelineLabel"></span></label>
    <input type="range" min="0" max="0" value="0" id="timelineRange" step="1" style="width:90%">
    <button id="playBtn">▶</button>
    <button id="pauseBtn">⏸</button>`;
  
  timelineRange = document.getElementById('timelineRange');
  timelineLabel = document.getElementById('timelineLabel');
  playBtn = document.getElementById('playBtn');
  pauseBtn = document.getElementById('pauseBtn');

  timelineRange.addEventListener('input', () => updateTimeline());
  playBtn.addEventListener('click', () => {
    if(timelineInterval) clearInterval(timelineInterval);
    timelineInterval = setInterval(() => {
      let idx = Number(timelineRange.value);
      if(idx < timelineQSOs.length -1){
        timelineRange.value = idx + 1;
        updateTimeline();
      } else {
        clearInterval(timelineInterval);
      }
    }, 900);
  });
  pauseBtn.addEventListener('click', () => {
    if(timelineInterval) clearInterval(timelineInterval);
  });
}

// Prépare timelineQSOs triés
function prepareTimeline(qsos){
  timelineQSOs = qsos.map(q => {
    return {...q, datetime: formatQSODateTime(q)};
  }).sort((a,b) => a.datetime - b.datetime);
  timelineRange.min = 0;
  timelineRange.max = timelineQSOs.length -1;
  timelineRange.value = 0;
  updateTimeline();
}

// Met à jour la carte et infos selon la timeline
function updateTimeline(){
  const idx = Number(timelineRange.value);
  const curQSO = timelineQSOs[idx];
  if(!curQSO) return;
  timelineLabel.textContent = curQSO.datetime.toISOString().substr(0,16).replace('T',' ');

  // Filtre QSOs à la date courante
  let visibles = timelineQSOs.slice(0, idx+1);
  const band = bandSelect.value;
  if(band){
    if(band === 'VHF') visibles = visibles.filter(q=>['2M','4M','6M'].includes(q.band));
    else if(band === 'UHF') visibles = visibles.filter(q=>['70CM'].includes(q.band));
    else visibles = visibles.filter(q => q.band === band);
  }
  markersLayer.clearLayers();
  displayMarkers(visibles);
  updatePropagationBox(visibles);
}

// Requête pour obtenir spot data, géolocalisation
async function enrichQSOs(qsos){
  for(let qso of qsos){
    try {
      const spotData = await getSpotHoleData(qso.call);
      if(spotData){
        const locator = spotData.dx_grid || spotData.grid || null;
        qso.locator = locator ? locator.toUpperCase():'Inconnu';
        const lat = spotData.dx_latitude ?? spotData.latitude ?? null;
        const lon = spotData.dx_longitude ?? spotData.longitude ?? null;
        if(lat !== null && lon !== null) qso.pos = {lat, lon};
        else if(locator) {
          const posApi = await getGridCenter(locator);
          qso.pos = posApi || locator6ToLatLon(locator) || locatorToLatLon(locator);
        }
      } else {
        qso.locator = 'Inconnu';
        qso.pos = null;
      }
    } catch(e) {
      qso.locator = 'Inconnu'; qso.pos = null;
    }
  }
  return qsos;
}

analyzeBtn.addEventListener('click', async () => {
  if(!validateLocator(qraLocatorInput.value)){
    alert("Merci d’entrer un QRA-locator valide.");
    return;
  }
  await showStarForLocator(qraLocatorInput.value.trim().toUpperCase());
  info.textContent = "";
  progressContainer.style.display = "block";
  progressBar.style.width = "0%";
  progressBar.textContent = "0%";
  markersLayer.clearLayers();

  const adifText = await adifFile.files[0].text();
  let qsos = parseADIF(adifText);
  progressBar.style.width = "20%";
  qsos = await enrichQSOs(qsos);
  progressBar.style.width = "60%";
  allQSOs = qsos;
  progressBar.style.width = "80%";
  createTimelineUI();
  prepareTimeline(allQSOs);
  progressBar.style.width = "100%";
  progressContainer.style.display = "none";
  bandSelect.dispatchEvent(new Event('change'));
});

// Maintiens tes autres listeners, notamment bandSelect change
bandSelect.addEventListener('change', updateTimeline);
qraLocatorInput.addEventListener('change', async () => {
  if(validateLocator(qraLocatorInput.value)){
    await showStarForLocator(qraLocatorInput.value.trim().toUpperCase());
  }
});

// le reste de tes fonctions showStarForLocator, getSpotHoleData, getGridCenter, locator conversions restent inchangés.
</script>
</body>
</html>
