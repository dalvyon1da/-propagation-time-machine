<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>QSO ADIF & spothole.app carte - Locator précis</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  body { margin:0; font-family: Arial, sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; height: 100vh; }
  #sidebar { width: 350px; background: #111; padding: 20px; box-sizing: border-box; overflow: auto; }
  #map { flex: 1; }
  input, button, select { width: 100%; padding: 8px; margin: 5px 0; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
  button, select { cursor: pointer; border-radius: 4px; }
  button { background: #007bff; }
  button:hover { background: #0a84ff; }
  select { background: #222; }
  .progress-container { display: none; width: 100%; background: #222; border-radius: 8px; margin: 10px 0; }
  .progress-bar { height: 20px; background: #4caf50; width: 0%; border-radius: 8px; text-align: center; color: #000; line-height: 20px; font-weight: bold; }
  #info { margin-top: 5px; color: #bbb; font-size: 13px; }
  #qsoTable { display:none; }
  .legend {
    font-size: 13px; margin-top: 10px; padding: 6px; background: #262626; border-radius: 6px;
  }
  .legend span { display: inline-block; width: 12px; height: 12px; margin-right: 6px; border-radius: 8px; vertical-align: middle;}
</style>
</head>
<body>
<div id="sidebar">
  <h2>CONTEST ANALYSE BY ON1DA</h2>

  <input type="text" id="qraLocator" placeholder="Entrer le QRA-Locator de la station (ex : JO20DJ)" maxlength="6" autocomplete="off" />
  <input type="file" id="adifFile" accept=".adi,.adif" disabled />
  <button id="analyzeBtn" disabled>Analyser et afficher</button>
  
  <select id="bandSelect">
    <option value="">Toutes bandes</option>
    <option value="160M">160m</option>
    <option value="80M">80m</option>
    <option value="60M">60m</option>
    <option value="40M">40m</option>
    <option value="30M">30m</option>
    <option value="20M">20m</option>
    <option value="17M">17m</option>
    <option value="15M">15m</option>
    <option value="12M">12m</option>
    <option value="10M">10m</option>
    <option value="6M">6m</option>
    <option value="4M">4m</option>
    <option value="2M">2m</option>
    <option value="70CM">70cm</option>
    <option value="VHF">VHF</option>
    <option value="UHF">UHF</option>
  </select>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>

  <p id="info"></p>

  <table id="qsoTable">
    <thead><tr><th>#</th><th>Callsign</th><th>Bande</th><th>Date</th><th>Locator</th></tr></thead>
    <tbody></tbody>
  </table>

  <div class="legend">
    <b>Couleur par bande :</b><br>
    <span style="background:#800080"></span>160m
    <span style="background:#0000CD"></span>80m
    <span style="background:#00CED1"></span>60m
    <span style="background:#228B22"></span>40m
    <span style="background:#8B4513"></span>30m
    <span style="background:#FFD700"></span>20m
    <span style="background:#FF8C00"></span>17m
    <span style="background:#DC143C"></span>15m
    <span style="background:#FF1493"></span>12m
    <span style="background:#00FF00"></span>10m
    <span style="background:#00FA9A"></span>6m
    <span style="background:#20B2AA"></span>4m
    <span style="background:#1E90FF"></span>2m
    <span style="background:#FF4500"></span>70cm
    <span style="background:#00BFFF"></span>VHF
    <span style="background:#A52A2A"></span>UHF
  </div>

  <!-- 🔥 Bloc propagation -->
  <div id="propagationBox" style="margin-top:20px; padding:10px; background:#222; border-radius:6px;">
    <h3>Propagation (K / Kp / A)</h3>
    <p id="propagationStatus">En attente d’analyse…</p>
  </div>

  <div id="timeline-container"></div>
</div>

<div id="map" style="height:100vh;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
function getBandColor(band) {
  const mapColor = {
    "160M": "#800080",
    "80M": "#0000CD",
    "60M": "#00CED1",
    "40M": "#228B22",
    "30M": "#8B4513",
    "20M": "#FFD700",
    "17M": "#FF8C00",
    "15M": "#DC143C",
    "12M": "#FF1493",
    "10M": "#00FF00",
    "6M": "#00FA9A",
    "4M": "#20B2AA",
    "2M": "#1E90FF",
    "70CM": "#FF4500",
    "VHF": "#00BFFF",
    "UHF": "#A52A2A"
  };
  return mapColor[band] || "#888888";
}

const map = L.map('map').setView([50.8,4.4],4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom: 18,
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

const qraLocatorInput = document.getElementById('qraLocator');
const adifFile = document.getElementById('adifFile');
const analyzeBtn = document.getElementById('analyzeBtn');
const bandSelect = document.getElementById('bandSelect');
const info = document.getElementById('info');
const progressContainer = document.getElementById('progressContainer');
const progressBar = document.getElementById('progressBar');
let allQSOs = [];
let markersLayer = L.layerGroup().addTo(map);
let starMarker = null;

function validateLocator(str) {
  return str && str.trim().length >= 4;
}
qraLocatorInput.addEventListener('input', () => {
  if(validateLocator(qraLocatorInput.value)) {
    adifFile.disabled = false;
    analyzeBtn.disabled = !adifFile.files.length;
  } else {
    adifFile.disabled = true;
    analyzeBtn.disabled = true;
  }
});
adifFile.addEventListener('change', () => {
  analyzeBtn.disabled = !adifFile.files.length || !validateLocator(qraLocatorInput.value);
});

function locatorToLatLon(locator){
  if(!locator || locator.length<4) return null;
  locator = locator.toUpperCase();
  const A = 'A'.charCodeAt(0);
  const lon = (locator.charCodeAt(0)-A)*20 -180 + parseInt(locator[2],10)*2 + 1;
  const lat = (locator.charCodeAt(1)-A)*10 -90 + parseInt(locator[3],10) + 0.5;
  return {lat, lon};
}
function locator6ToLatLon(locator) {
  if(!locator || locator.length < 6) return null;
  locator = locator.toUpperCase();

  const A = 'A'.charCodeAt(0);
  const lon = (locator.charCodeAt(0) - A) * 20 - 180
            + parseInt(locator[2], 10) * 2
            + (locator.charCodeAt(4) - A) * (2/24)
            + (2/48);

  const lat = (locator.charCodeAt(1) - A) * 10 - 90
            + parseInt(locator[3], 10)
            + (locator.charCodeAt(5) - A) * (1/24)
            + (1/48);

  return {lat, lon};
}

function parseADIF(text) {
  const qsos = [];
  const records = text.split(/<EOR>/i);
  for(const rec of records) {
    const callMatch = rec.match(/<CALL:\s*\d+>\s*([^<\s]+)/i);
    if(!callMatch) continue;
    const bandMatch = rec.match(/<BAND:\s*\d+>\s*([^<\s]+)/i);
    const dateMatch = rec.match(/<QSO_DATE:\s*\d+>\s*(\d{8})/i);
    const timeMatch = rec.match(/<TIME_ON:\s*\d+>\s*(\d{4})/i);
    qsos.push({
      call: callMatch[1].trim().toUpperCase(),
      band: bandMatch ? bandMatch[1].trim().toUpperCase() : 'N/A',
      date: dateMatch ? dateMatch[1].trim() : 'N/A',
      time: timeMatch ? timeMatch[1].trim() : '0000'
    });
  }
  return qsos;
}

async function getSpotHoleData(callsign){
  try {
    const url = `https://spothole.app/api/v1/lookup/call?call=${encodeURIComponent(callsign)}`;
    const response = await fetch(url);
    if(!response.ok) throw new Error(`HTTP ${response.status}`);
    const json = await response.json();
    return Array.isArray(json)? json[0]||null : json;
  } catch(e) {
    console.error("Erreur API spothole.app pour", callsign, e);
    return null;
  }
}
async function getGridCenter(gridLocator){
  if(!gridLocator) return null;
  try {
    const response = await fetch(`https://spothole.app/api/v1/recherche/grille?grille=${encodeURIComponent(gridLocator)}`);
    if(!response.ok) return null;
    const json = await response.json();
    if(json?.center?.latitude != null && json?.center?.longitude != null)
      return {lat: json.center.latitude, lon: json.center.longitude};
    return null;
  } catch(e) {
    console.error("Erreur récupération coordonnées grid", e);
    return null;
  }
}

async function showStarForLocator(locator) {
  if (starMarker) map.removeLayer(starMarker);
  let pos = null;
  if (locator && locator.length >= 4){
    const posFromAPI = await getGridCenter(locator);
    if (posFromAPI) {
      pos = posFromAPI;
    }
  }
  if (!pos) {
    if(locator.length >= 6) {
      pos = locator6ToLatLon(locator);
    } else {
      pos = locatorToLatLon(locator);
    }
  }
  if(!pos) return;
  const starIcon = L.divIcon({
    html: `<svg width="28" height="28" viewBox="0 0 28 28" >
      <polygon points="14,2 17,11 27,11 19,17 22,27 14,21 6,27 9,17 1,11 11,11" fill="#FFD700" stroke="#C0B000" stroke-width="2"/>
    </svg>`,
    className: '',
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });
  starMarker = L.marker([pos.lat, pos.lon], {icon: starIcon, zIndexOffset: 999}).addTo(map);
  map.setView([pos.lat, pos.lon], 7);
}

function displayMarkers(filteredQSOs) {
  markersLayer.clearLayers();
  let localizedCount = 0;
  for(const qso of filteredQSOs) {
    if(qso.pos) {
      localizedCount++;
      L.circleMarker([qso.pos.lat, qso.pos.lon], {
        radius: 6,
        color: getBandColor(qso.band),
        fillColor: getBandColor(qso.band),
        fillOpacity: 0.8
      }).addTo(markersLayer).bindPopup(
        `<b>Call:</b> ${qso.call}<br/><b>Bande:</b> ${qso.band}<br/><b>Date:</b> ${qso.date}<br/><b>Locator:</b> ${qso.locator}`
      );
    }
  }
  info.textContent = `QSO affichés : ${filteredQSOs.length} — QSO géolocalisés : ${localizedCount}`;
  if(starMarker) starMarker.bringToFront();
  const first = filteredQSOs.find(q => q.pos);
  if(first && first.pos) map.setView([first.pos.lat, first.pos.lon], 6);
}

/* ---------------- TIMELINE ---------------- */

let currentOverlay = null;
let timelineQSOs = [];
let timelineDateTimes = [];

const timelineDiv = document.createElement('div');
timelineDiv.innerHTML = `
  <label><b>Concours timeline :</b> <span id="timelineLabel"></span></label>
  <input type="range" min="0" max="0" value="0" id="timelineRange" step="1" style="width:90%">
  <button id="playBtn">▶</button>
  <button id="pauseBtn">⏸</button>
`;
document.getElementById('timeline-container').appendChild(timelineDiv);

const timelineRange = document.getElementById('timelineRange');
const timelineLabel = document.getElementById('timelineLabel');
const playBtn = document.getElementById('playBtn');
const pauseBtn = document.getElementById('pauseBtn');

function formatQSODateTime(qso) {
  let time = qso.time || '0000';
  let hours = parseInt(time.substring(0,2));
  let mins = parseInt(time.substring(2,4));
  return new Date(`${qso.date.substring(0,4)}-${qso.date.substring(4,6)}-${qso.date.substring(6,8)}T${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}:00Z`);
}

function buildTimelineQSOs(qsos) {
  for(const qso of qsos){
    qso.datetime = formatQSODateTime(qso);
  }
  timelineQSOs = qsos.slice().sort((a,b)=>a.datetime-b.datetime);
  timelineDateTimes = timelineQSOs.map(q=>q.datetime);
  timelineRange.min = 0;
  timelineRange.max = timelineQSOs.length-1;
}

function getBandForTimelineQSO(idx){
  const qso = timelineQSOs[idx];
  if(!qso) return 20;
  return qso.band.replace("M","").replace("CM","").trim() || 20;
}

async function updateTimelineMap() {
  const idx = Number(timelineRange.value) || 0;
  const curQSO = timelineQSOs[idx];
  if(!curQSO) return;

  timelineLabel.textContent = curQSO.datetime.toISOString().replace('T',' ').substring(0,16);

  const visible = timelineQSOs.slice(0, idx+1);

  const band = bandSelect.value;
  let filteredVisible;
  if(!band) {
    filteredVisible = visible;
  } else if (band === "VHF") {
    filteredVisible = visible.filter(q => ["2M", "4M", "6M"].includes(q.band));
  } else if (band === "UHF") {
    filteredVisible = visible.filter(q => ["70CM"].includes(q.band));
  } else {
    filteredVisible = visible.filter(q => q.band === band);
  }

  markersLayer.clearLayers();
  displayMarkers(filteredVisible);

  if(currentOverlay) {
    map.removeLayer(currentOverlay);
    currentOverlay = null;
  }

  const qraLocator = (qraLocatorInput.value || 'JO20DJ').toUpperCase();
  const bandHz = getBandForTimelineQSO(idx);
  const d = curQSO.datetime;

  const url = `https://www.voacap.com/hf/coverage.php?tx=${qraLocator}&band=${bandHz}&hh=${d.getUTCHours()}&mm=${d.getUTCMinutes()}&dd=${d.getUTCDate()}&mo=${d.getUTCMonth()+1}&yy=${d.getUTCFullYear()}`;

  currentOverlay = L.imageOverlay(url, [[-90, -180], [90, 180]], {opacity:0.5}).addTo(map);
}

let timelineInterval = null;
playBtn.addEventListener('click', async () => {
  if (timelineInterval) clearInterval(timelineInterval);
  timelineInterval = setInterval(async () => {
    let idx = Number(timelineRange.value);
    if (idx < timelineQSOs.length-1) {
      timelineRange.value = idx+1;
      await updateTimelineMap();
    } else {
      clearInterval(timelineInterval);
    }
  }, 900);
});
pauseBtn.addEventListener('click', () => {
  if (timelineInterval) clearInterval(timelineInterval);
});
timelineRange.addEventListener('input', async () => {
  await updateTimelineMap();
});

qraLocatorInput.addEventListener('change', async () => {
  const val = qraLocatorInput.value.trim().toUpperCase();
  if(validateLocator(val)) {
    await showStarForLocator(val);
  }
});

bandSelect.addEventListener('change', async () => {
  await updateTimelineMap();
});

/* ---------------- ANALYSE ADIF ---------------- */

analyzeBtn.addEventListener('click', async () => {
  const qraLocator = qraLocatorInput.value.trim().toUpperCase();
  if(!validateLocator(qraLocator)) {
    alert("Merci d’entrer un QRA-locator valide.");
    return;
  }
  await showStarForLocator(qraLocator);

  info.textContent = "";
  progressContainer.style.display = "block";
  progressBar.style.width = "0%";
  progressBar.textContent = "0%";

  markersLayer.clearLayers();

  map.setView(locator6ToLatLon(qraLocator) || [50.8,4.4], 6);

  const text = await adifFile.files[0].text();
  const qsos = parseADIF(text);
  allQSOs = [];
  for(let i=0; i<qsos.length; i++) {
    const qso = qsos[i];
    const spotData = await getSpotHoleData(qso.call);
    let lat=null, lon=null, locator=null;
    if(spotData){
      locator = spotData.dx_grid || spotData.grid || null;
      lat = spotData.dx_latitude != null ? spotData.dx_latitude : (spotData.latitude != null ? spotData.latitude : null);
      lon = spotData.dx_longitude != null ? spotData.dx_longitude : (spotData.longitude != null ? spotData.longitude : null);
    }
    qso.locator = locator ? locator.toUpperCase() : 'Inconnu';
    let pos=null;
    if(lat !== null && lon !== null) pos = {lat, lon};
    else if(locator){
      pos = await getGridCenter(locator);
      if(!pos) pos = locator6ToLatLon(locator) || locatorToLatLon(locator);
    }
    qso.pos = pos || null;
    allQSOs.push(qso);

    const percent = Math.round(100*(i+1)/qsos.length);
    progressBar.style.width = percent + '%';
    progressBar.textContent = percent + '%';

    await new Promise(r => setTimeout(r, 200));
  }
  progressContainer.style.display = "none";
  buildTimelineQSOs(allQSOs);
  timelineRange.value = 0;
  await updateTimelineMap();

  /* ---------------- PROPAGATION ---------------- */

  const dateRange = extractDatesFromQSOs(allQSOs);
  if (dateRange) {
    const propData = await fetchPropagation(dateRange.min, dateRange.max);
    displayPropagation(propData);
  }
});

/* ---------------- MODULE PROPAGATION ---------------- */

function extractDatesFromQSOs(qsos) {
  const dates = qsos
    .map(q => q.date)
    .filter(d => d && d !== "N/A");

  if (dates.length === 0) return null;

  const formatted = dates.map(d =>
    `${d.substring(0,4)}-${d.substring(4,6)}-${d.substring(6,8)}`
  );

  formatted.sort();

  return {
    min: formatted[0],
    max: formatted[formatted.length - 1]
  };
}
async function fetchPropagation(minDate, maxDate) {
  const url = `https://kp.gfz.de/kpdata?startdate=${minDate}&enddate=${maxDate}&format=kp1`;

  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error("Erreur API propagation");

    const text = await response.text();
    const lines = text.trim().split("\n");

    if (lines.length === 0) return null;

    // On prend la dernière ligne (la plus récente)
    const cols = lines[lines.length - 1].trim().split(/\s+/);

    return {
      K: cols[7],     // colonne K
      Kp: cols[8],    // colonne Kp
      A: cols[14]     // colonne A
    };

  } catch (e) {
    console.error("Erreur propagation :", e);
    return null;
  }

function evaluatePropagation(kp) {
  if (kp <= 2) return {text: "Bonne propagation", color: "lime"};
  if (kp <= 4) return {text: "Propagation moyenne", color: "orange"};
  return {text: "Mauvaise propagation", color: "red"};
}

function displayPropagation(data) {
    const box = document.getElementById("propagationStatus");

    if (!data) {
        box.innerHTML = "Impossible de récupérer les indices.";
        box.style.color = "red";
        return;
    }

    const K = data.K || "?";
    const Kp = data.Kp || "?";
    const A = data.A || "?";

    const evalP = evaluatePropagation(parseFloat(Kp));

    box.innerHTML = `
    <b>K :</b> ${K}<br>
    <b>Kp :</b> ${Kp}<br>
    <b>A :</b> ${A}<br>
    <b>${evalP.text}</b>
`;
    box.style.color = evalP.color;
}


</script>
</body>
</html>
