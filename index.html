<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>QSO ADIF + Carte spothole.app</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  body { margin: 0; font-family: Arial, sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; height: 100vh; }
  #sidebar { width: 350px; background: #111; padding: 20px; box-sizing: border-box; overflow: auto; }
  #map { flex: 1; }
  input, button { width: 100%; padding: 8px; margin: 5px 0; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
  button { cursor: pointer; background: #007bff; border-radius: 4px; }
  button:hover { background: #0a84ff; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
  th, td { border: 1px solid #444; padding: 5px 8px; text-align: left; }
  .progress-container { display: none; width: 100%; background: #222; border-radius: 8px; margin: 10px 0; }
  .progress-bar { height: 20px; background: #4caf50; width: 0%; border-radius: 8px; text-align: center; color: #000; line-height: 20px; font-weight: bold; }
  #info { margin-top: 5px; color: #bbb; font-size: 13px; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>QSO ADIF & spothole.app</h2>
  <input type="file" id="adifFile" accept=".adi,.adif" />
  <button id="analyzeBtn">Analyser et afficher</button>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>

  <p id="info"></p>

  <table id="qsoTable">
    <thead><tr><th>#</th><th>Callsign</th><th>Bande</th><th>Date</th><th>Locator</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([50.8,4.4],4);
  L.tileLayer('https://stamen-tiles-{s}.a.ssl.fastly.net/terrain/{z}/{x}/{y}.jpg', {
    maxZoom: 18,
    attribution: 'Map tiles &copy; Stamen | Data &copy; OpenStreetMap',
  }).addTo(map);

  const adifFile = document.getElementById('adifFile');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const info = document.getElementById('info');
  const tbody = document.querySelector('#qsoTable tbody');
  const progressContainer = document.getElementById('progressContainer');
  const progressBar = document.getElementById('progressBar');

  function parseADIF(text) {
    const qsos = [];
    const records = text.split(/<EOR>/i);
    for(let rec of records) {
      const callMatch = rec.match(/<CALL:\s*\d+>\s*([^<\s]+)/i);
      if (!callMatch) continue;
      const bandMatch = rec.match(/<BAND:\s*\d+>\s*([^<\s]+)/i);
      const dateMatch = rec.match(/<QSO_DATE:\s*\d+>\s*(\d{8})/i);
      qsos.push({
        call: callMatch[1].trim().toUpperCase(),
        band: bandMatch ? bandMatch[1].trim() : 'N/A',
        date: dateMatch ? dateMatch[1].trim() : 'N/A'
      });
    }
    return qsos;
  }

  async function getSpotHoleData(callsign){
    try {
      const response = await fetch(`https://spothole.app/api/v1/lookup/call?call=${encodeURIComponent(callsign)}`);
      if(!response.ok) throw new Error('HTTP '+response.status);
      const data = await response.json();
      return Array.isArray(data) ? (data[0] || null) : data;
    } catch(e) {
      console.error('Erreur API spothole.app pour', callsign, e);
      return null;
    }
  }

  async function getGridCenter(gridLocator){
    if(!gridLocator) return null;
    try {
      const response = await fetch(`https://spothole.app/api/v1/recherche/grille?grille=${encodeURIComponent(gridLocator)}`);
      if(!response.ok) return null;
      const json = await response.json();
      if(json?.center?.latitude != null && json?.center?.longitude != null){
        return {lat: json.center.latitude, lon: json.center.longitude};
      }
      return null;
    } catch(e) {
      console.error('Erreur récupération coordonnees grid', e);
      return null;
    }
  }

  function locatorToLatLon(locator){
    if(!locator || locator.length < 4) return null;
    locator = locator.toUpperCase();
    const A = 'A'.charCodeAt(0);
    const lon = (locator.charCodeAt(0) - A)*20 - 180 + parseInt(locator[2],10)*2 + 1;
    const lat = (locator.charCodeAt(1) - A)*10 - 90 + parseInt(locator[3],10) + 0.5;
    return {lat, lon};
  }

  analyzeBtn.addEventListener('click', async () => {
    if(!adifFile.files.length){
      alert('Veuillez sélectionner un fichier ADIF');
      return;
    }

    info.textContent = '';
    tbody.innerHTML = '';
    progressContainer.style.display = 'block';
    progressBar.style.width = '0%';
    progressBar.textContent = '0%';

    map.eachLayer(layer => {
      if(layer instanceof L.Marker || layer instanceof L.CircleMarker) {
        map.removeLayer(layer);
      }
    });

    const text = await adifFile.files[0].text();
    const qsos = parseADIF(text);
    info.textContent = `QSO détectés : ${qsos.length}`;

    let localizedCount = 0;

    for(let i = 0; i < qsos.length; i++){
      const qso = qsos[i];
      let spotData = await getSpotHoleData(qso.call);
      let lat = null, lon = null, locator = null;
      if(spotData){
        locator = spotData.dx_grid || null;
        lat = spotData.dx_latitude || null;
        lon = spotData.dx_longitude || null;
      }
      qso.locator = locator ? locator.toUpperCase() : 'Inconnu';
      let pos = null;
      if(lat !== null && lon !== null){
        pos = {lat, lon};
      } else if(locator){
        pos = await getGridCenter(locator);
        if(!pos){
          // fallback conversion approximative
          pos = locatorToLatLon(locator);
        }
      }
      if(pos){
        localizedCount++;
        L.circleMarker([pos.lat, pos.lon], {
          radius: 6,
          color: 'green',
          fillOpacity: 0.8,
        }).addTo(map).bindPopup(`<b>Call:</b> ${qso.call}<br/><b>Bande:</b> ${qso.band}<br/><b>Date:</b> ${qso.date}<br/><b>Locator:</b> ${qso.locator}`);
      }

      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${i+1}</td><td>${qso.call}</td><td>${qso.band}</td><td>${qso.date}</td><td>${qso.locator}</td>`;
      tbody.appendChild(tr);

      const percent = Math.round(100 * (i + 1) / qsos.length);
      progressBar.style.width = percent + '%';
      progressBar.textContent = percent + '%';

      await new Promise(r => setTimeout(r, 250)); // throttle API calls
    }

    progressContainer.style.display = 'none';

    const firstValid = qsos.find(q => q.locator !== 'Inconnu');
    if(firstValid){
      let centerPos = null;
      if(firstValid.dx_latitude != null && firstValid.dx_longitude != null)
        centerPos = {lat: firstValid.dx_latitude, lon: firstValid.dx_longitude};
      else if(firstValid.locator)
        centerPos = locatorToLatLon(firstValid.locator);
      if(centerPos) map.setView([centerPos.lat, centerPos.lon], 6);
    }

    info.textContent = `QSO détectés : ${qsos.length} — QSO géolocalisés : ${localizedCount}`;
  });
</script>
</body>
</html>
