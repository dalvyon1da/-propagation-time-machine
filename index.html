<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>QSO ADIF & spothole.app carte - Locator précis</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  body { margin:0; font-family: Arial, sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; height: 100vh; }
  #sidebar { width: 350px; background: #111; padding: 20px; box-sizing: border-box; overflow: auto; }
  #map { flex: 1; }
  input, button, select { width: 100%; padding: 8px; margin: 5px 0; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
  button, select { cursor: pointer; border-radius: 4px; }
  button { background: #007bff; }
  button:hover { background: #0a84ff; }
  select { background: #222; }
  .progress-container { display: none; width: 100%; background: #222; border-radius: 8px; margin: 10px 0; }
  .progress-bar { height: 20px; background: #4caf50; width: 0%; border-radius: 8px; text-align: center; color: #000; line-height: 20px; font-weight: bold; }
  #info { margin-top: 5px; color: #bbb; font-size: 13px; }
  #qsoTable { display:none; }
  .legend {
    font-size: 13px; margin-top: 10px; padding: 6px; background: #262626; border-radius: 6px;
  }
  .legend span { display: inline-block; width: 12px; height: 12px; margin-right: 6px; border-radius: 8px; vertical-align: middle;}
  #propagation-box {
    margin: 10px 0;
    padding: 10px;
    background: #23272b;
    border-left: 6px solid #FFD700;
    border-radius: 6px;
    color: #fff;
    font-size: 13px;
  }
  #propagation-box a {
    color: #4caf50;
    word-break: break-word;
  }
</style>
</head>
<body>
<div id="sidebar">
  <h2>CONTEST ANALYSE BY ON1DA</h2>
  <input type="text" id="qraLocator" placeholder="Entrer le QRA-Locator de la station (ex : JO20DJ)" maxlength="6" autocomplete="off" />
  <input type="file" id="adifFile" accept=".adi,.adif" disabled />
  <button id="analyzeBtn" disabled>Analyser et afficher</button>
  
  <select id="bandSelect">
    <option value="">Toutes bandes</option>
    <option value="160M">160m</option>
    <option value="80M">80m</option>
    <option value="60M">60m</option>
    <option value="40M">40m</option>
    <option value="30M">30m</option>
    <option value="20M">20m</option>
    <option value="17M">17m</option>
    <option value="15M">15m</option>
    <option value="12M">12m</option>
    <option value="10M">10m</option>
    <option value="6M">6m</option>
    <option value="4M">4m</option>
    <option value="2M">2m</option>
    <option value="70CM">70cm</option>
    <option value="VHF">VHF</option>
    <option value="UHF">UHF</option>
  </select>
  
  <!-- Encadré Propagation + lien vers GFZ KP -->
  <div id="propagation-box">
    <b>Indices propagation GFZ KP : </b><br/>
    <a href="#" target="_blank" id="gfz-kp-link">Chargement...</a>
  </div>
  
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>
  <p id="info"></p>
  
  <div id="timeline-container" style="margin-top:10px;"></div>
  
  <div class="legend">
    <b>Légende des couleurs Kp :</b><br>
    <span style="background:#00e676"></span> Bon (Kp &lt; 3)<br>
    <span style="background:#FFD700"></span> Moyen (Kp 3-5)<br>
    <span style="background:#ef5350"></span> Mauvais (Kp &gt;= 5)
  </div>
  
</div>
<div id="map" style="height:100vh;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Ton code existant complet ici (validateLocator, locatorToLatLon, locator6ToLatLon, parseADIF, showStarForLocator, getSpotHoleData, getGridCenter, displayMarkers, timeline etc.)
  // Pour la lisibilité, je conserve ta base sans la recopier, car tu me disais que le code fonctionne déjà bien.

  // Ici ajout des fonctions pour construire URL GFZ KP selon les dates QSO

  // Transforme date QSO AAAAMMJJ en YYYY-MM-DD format
  function getDateStrFromQSO(qsoDate) {
    if(qsoDate.length !== 8) return null;
    return `${qsoDate.substring(0,4)}-${qsoDate.substring(4,6)}-${qsoDate.substring(6,8)}`;
  }

  // Construit l'URL GFZ KP pour la plage des dates de QSOs
  function buildGFZKpUrlFromAllQSOs(allQSOs) {
    if(!allQSOs.length) return null;
    const uniqueDates = [...new Set(allQSOs.map(q => q.date))].sort();
    const minDateStr = getDateStrFromQSO(uniqueDates[0]);
    const maxDateStr = getDateStrFromQSO(uniqueDates[uniqueDates.length - 1]);
    if(!minDateStr || !maxDateStr) return null;
    return `https://kp.gfz.de/kpdata?startdate=${minDateStr}&enddate=${maxDateStr}&format=kp1#kpdatadownload-143`;
  }

  // Met à jour l'affichage et le lien dans la barre propagation
  function updatePropagationBoxLink(url) {
    const link = document.getElementById('gfz-kp-link');
    if(!url) {
      link.textContent = "Aucune plage de dates détectée";
      link.href = '#';
      return;
    }
    link.textContent = url;
    link.href = url;
    link.target = "_blank";
  }

  // Intégration dans ton bouton "Analyser"
  analyzeBtn.addEventListener('click', async () => {
    // ... ton code analyse complet existant ...
    // Après avoir chargé et rempli allQSOs:
    
    // Construire et mettre à jour le lien GFZ KP
    const urlGFZ = buildGFZKpUrlFromAllQSOs(allQSOs);
    updatePropagationBoxLink(urlGFZ);
    
    // Puis la suite normale : timeline, affichage etc.
  });

  // ... reste de ton code existant ...
</script>
</body>
</html>
