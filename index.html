<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>QSO ADIF & spothole.app carte - Locator précis</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  body { margin:0; font-family: Arial, sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; height: 100vh; }
  #sidebar { width: 350px; background: #111; padding: 20px; box-sizing: border-box; overflow: auto; }
  #map { flex: 1; }
  input, button, select { width: 100%; padding: 8px; margin: 5px 0; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
  button, select { cursor: pointer; border-radius: 4px; }
  button { background: #007bff; }
  button:hover { background: #0a84ff; }
  select { background: #222; }
  .progress-container { display: none; width: 100%; background: #222; border-radius: 8px; margin: 10px 0; }
  .progress-bar { height: 20px; background: #4caf50; width: 0%; border-radius: 8px; text-align: center; color: #000; line-height: 20px; font-weight: bold; }
  #info { margin-top: 5px; color: #bbb; font-size: 13px; }
  #qsoTable { display:none; }
  .legend {
    font-size: 13px; margin-top: 10px; padding: 6px; background: #262626; border-radius: 6px;
  }
  .legend span { display: inline-block; width: 12px; height: 12px; margin-right: 6px; border-radius: 8px; vertical-align: middle;}
</style>
</head>
<body>
<div id="sidebar">
  <h2>QSO ADIF / Carte spothole.app</h2>
  <!-- Champ pour saisir le locator de ta station -->
  <input type="text" id="qraLocator" placeholder="Entrer le QRA-Locator de la station (ex : JO20DJ)" maxlength="6" autocomplete="off" />
  <input type="file" id="adifFile" accept=".adi,.adif" disabled />
  <button id="analyzeBtn" disabled>Analyser et afficher</button>
  
  <select id="bandSelect">
    <option value="">Toutes bandes</option>
    <option value="160M">160m</option>
    <option value="80M">80m</option>
    <option value="60M">60m</option>
    <option value="40M">40m</option>
    <option value="30M">30m</option>
    <option value="20M">20m</option>
    <option value="17M">17m</option>
    <option value="15M">15m</option>
    <option value="12M">12m</option>
    <option value="10M">10m</option>
    <option value="6M">6m</option>
    <option value="4M">4m</option>
    <option value="2M">2m</option>
    <option value="70CM">70cm</option>
    <option value="VHF">VHF</option>
    <option value="UHF">UHF</option>
  </select>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>

  <p id="info"></p>

  <table id="qsoTable">
    <thead><tr><th>#</th><th>Callsign</th><th>Bande</th><th>Date</th><th>Locator</th></tr></thead>
    <tbody></tbody>
  </table>
  
  <div class="legend">
    <b>Couleur par bande :</b><br>
    <span style="background:#800080"></span>160m
    <span style="background:#0000CD"></span>80m
    <span style="background:#00CED1"></span>60m
    <span style="background:#228B22"></span>40m
    <span style="background:#8B4513"></span>30m
    <span style="background:#FFD700"></span>20m
    <span style="background:#FF8C00"></span>17m
    <span style="background:#DC143C"></span>15m
    <span style="background:#FF1493"></span>12m
    <span style="background:#00FF00"></span>10m
    <span style="background:#00FA9A"></span>6m
    <span style="background:#20B2AA"></span>4m
    <span style="background:#1E90FF"></span>2m
    <span style="background:#FF4500"></span>70cm
    <span style="background:#00BFFF"></span>VHF
    <span style="background:#A52A2A"></span>UHF
  </div>
</div>
<div id="map" style="height:100vh;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Couleurs par bande
  function getBandColor(band) {
    const mapColor = {
      "160M": "#800080",
      "80M": "#0000CD",
      "60M": "#00CED1",
      "40M": "#228B22",
      "30M": "#8B4513",
      "20M": "#FFD700",
      "17M": "#FF8C00",
      "15M": "#DC143C",
      "12M": "#FF1493",
      "10M": "#00FF00",
      "6M": "#00FA9A",
      "4M": "#20B2AA",
      "2M": "#1E90FF",
      "70CM": "#FF4500",
      "VHF": "#00BFFF",
      "UHF": "#A52A2A"
    };
    return mapColor[band] || "#888888";
  }

  // Init carte
  const map = L.map('map').setView([50.8,4.4],4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom: 18,
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  const qraLocatorInput = document.getElementById('qraLocator');
  const adifFile = document.getElementById('adifFile');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const bandSelect = document.getElementById('bandSelect');
  const info = document.getElementById('info');
  const progressContainer = document.getElementById('progressContainer');
  const progressBar = document.getElementById('progressBar');
  const tbody = document.querySelector('#qsoTable tbody');
  let allQSOs = [];
  let markersLayer = L.layerGroup().addTo(map);
  let starMarker = null;

  // Activer input fichier et bouton après saisie locator valide
  function validateLocator(str) {
    return str && str.trim().length >= 4;
  }
  qraLocatorInput.addEventListener('input', () => {
    if(validateLocator(qraLocatorInput.value)) {
      adifFile.disabled = false;
      analyzeBtn.disabled = !adifFile.files.length;
    } else {
      adifFile.disabled = true;
      analyzeBtn.disabled = true;
    }
  });
  adifFile.addEventListener('change', () => {
    analyzeBtn.disabled = !adifFile.files.length || !validateLocator(qraLocatorInput.value);
  });

  function locatorToLatLon(locator){
    if(!locator || locator.length<4) return null;
    locator = locator.toUpperCase();
    const A = 'A'.charCodeAt(0);
    const lon = (locator.charCodeAt(0)-A)*20 -180 + parseInt(locator[2],10)*2 + 1;
    const lat = (locator.charCodeAt(1)-A)*10 -90 + parseInt(locator[3],10) + 0.5;
    return {lat, lon};
  }

  function parseADIF(text) {
    const qsos = [];
    const records = text.split(/<EOR>/i);
    for(const rec of records) {
      const callMatch = rec.match(/<CALL:\s*\d+>\s*([^<\s]+)/i);
      if(!callMatch) continue;
      const bandMatch = rec.match(/<BAND:\s*\d+>\s*([^<\s]+)/i);
      const dateMatch = rec.match(/<QSO_DATE:\s*\d+>\s*(\d{8})/i);
      qsos.push({
        call: callMatch[1].trim().toUpperCase(),
        band: bandMatch ? bandMatch[1].trim().toUpperCase() : 'N/A',
        date: dateMatch ? dateMatch[1].trim() : 'N/A'
      });
    }
    return qsos;
  }

  async function getSpotHoleData(callsign){
    try {
      const url = `https://spothole.app/api/v1/lookup/call?call=${encodeURIComponent(callsign)}`;
      const response = await fetch(url);
      if(!response.ok) throw new Error(`HTTP ${response.status}`);
      const json = await response.json();
      return Array.isArray(json)? json[0]||null : json;
    } catch(e) {
      console.error("Erreur API spothole.app pour", callsign, e);
      return null;
    }
  }

  async function getGridCenter(gridLocator){
    if(!gridLocator) return null;
    try {
      const response = await fetch(`https://spothole.app/api/v1/recherche/grille?grille=${encodeURIComponent(gridLocator)}`);
      if(!response.ok) return null;
      const json = await response.json();
      if(json?.center?.latitude != null && json?.center?.longitude != null)
        return {lat: json.center.latitude, lon: json.center.longitude};
      return null;
    } catch(e) {
      console.error("Erreur récupération coordonnées grid", e);
      return null;
    }
  }

  async function showStarForLocator(locator) {
    if(starMarker) map.removeLayer(starMarker);
    const posFromAPI = await getGridCenter(locator);
    let pos = null;
    if(posFromAPI) pos = posFromAPI;
    else pos = locatorToLatLon(locator);
    if(!pos) return;
    const starIcon = L.divIcon({
      html: `<svg width="28" height="28" viewBox="0 0 28 28" >
        <polygon points="14,2 17,11 27,11 19,17 22,27 14,21 6,27 9,17 1,11 11,11" fill="#FFD700" stroke="#C0B000" stroke-width="2"/>
      </svg>`,
      className: '',
      iconSize: [28, 28],
      iconAnchor: [14, 14]
    });
    starMarker = L.marker([pos.lat, pos.lon], {icon: starIcon, zIndexOffset: 999}).addTo(map);
    map.setView([pos.lat, pos.lon],7);
  }

  function displayMarkers(filteredQSOs) {
    markersLayer.clearLayers();
    let localizedCount = 0;
    for(const qso of filteredQSOs) {
      if(qso.pos) {
        localizedCount++;
        L.circleMarker([qso.pos.lat, qso.pos.lon], {
          radius: 6,
          color: getBandColor(qso.band),
          fillColor: getBandColor(qso.band),
          fillOpacity: 0.8
        }).addTo(markersLayer).bindPopup(
          `<b>Call:</b> ${qso.call}<br/><b>Bande:</b> ${qso.band}<br/><b>Date:</b> ${qso.date}<br/><b>Locator:</b> ${qso.locator}`
        );
      }
    }
    info.textContent = `QSO affichés : ${filteredQSOs.length} — QSO géolocalisés : ${localizedCount}`;
    if(starMarker) starMarker.bringToFront();
    const first = filteredQSOs.find(q => q.pos);
    if(first && first.pos) map.setView([first.pos.lat, first.pos.lon], 6);
  }

  bandSelect.addEventListener('change', () => {
    if(!allQSOs.length) return;
    const band = bandSelect.value;
    let filter;
    if(!band) filter = allQSOs;
    else if(band === "VHF") filter = allQSOs.filter(q => ["2M", "4M", "6M"].includes(q.band));
    else if(band === "UHF") filter = allQSOs.filter(q => ["70CM"].includes(q.band));
    else filter = allQSOs.filter(q => q.band === band);
    displayMarkers(filter);
  });

  qraLocatorInput.addEventListener('change', () => {
    const val = qraLocatorInput.value.trim().toUpperCase();
    if(validateLocator(val)) {
      showStarForLocator(val);
    }
  });

  analyzeBtn.addEventListener('click', async () => {
    const qraLocator = qraLocatorInput.value.trim().toUpperCase();
    if(!validateLocator(qraLocator)) {
      alert("Merci d’entrer un QRA-locator valide.");
      return;
    }
    await showStarForLocator(qraLocator);

    info.textContent = "";
    progressContainer.style.display = "block";
    progressBar.style.width = "0%";
    progressBar.textContent = "0%";

    markersLayer.clearLayers();

    map.setView(locatorToLatLon(qraLocator) || [50.8,4.4], 6);

    const text = await adifFile.files[0].text();
    const qsos = parseADIF(text);

    allQSOs = [];
    for(let i=0; i<qsos.length; i++) {
      const qso = qsos[i];
      const spotData = await getSpotHoleData(qso.call);
      let lat=null, lon=null, locator=null;
      if(spotData){
        locator = spotData.dx_grid || spotData.grid || null;
        lat = spotData.dx_latitude != null ? spotData.dx_latitude : (spotData.latitude != null ? spotData.latitude : null);
        lon = spotData.dx_longitude != null ? spotData.dx_longitude : (spotData.longitude != null ? spotData.longitude : null);
      }
      qso.locator = locator ? locator.toUpperCase() : 'Inconnu';
      let pos=null;
      if(lat !== null && lon !== null) pos = {lat, lon};
      else if(locator){
        pos = await getGridCenter(locator);
        if(!pos) pos = locatorToLatLon(locator);
      }
      qso.pos = pos || null;
      allQSOs.push(qso);

      const percent = Math.round(100*(i+1)/qsos.length);
      progressBar.style.width = percent + '%';
      progressBar.textContent = percent + '%';

      await new Promise(r => setTimeout(r, 250));
    }
    progressContainer.style.display = "none";
    bandSelect.dispatchEvent(new Event('change'));
  });
</script>
</body>
</html>
