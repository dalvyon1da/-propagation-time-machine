<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>QSO ADIF avec indices Kp GFZ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  /* Styles comme précédemment, adaptés pour la barre propagation et légende */
  body { margin: 0; font-family: Arial, sans-serif; background: #1e1e1e; color: #e0e0e0; display: flex; height: 100vh; }
  #sidebar { width: 350px; background: #111; padding: 20px; box-sizing: border-box; overflow: auto; }
  #map { flex: 1; }
  input, button, select { width: 100%; padding: 8px; margin: 5px 0; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
  button, select { cursor: pointer; border-radius: 4px; }
  button { background: #007bff; }
  button:hover { background: #0a84ff; }
  select { background: #222; }
  .progress-container { display: none; width: 100%; background: #222; border-radius: 8px; margin: 10px 0; }
  .progress-bar { height: 20px; background: #4caf50; width: 0%; border-radius: 8px; text-align: center; color: #000; line-height: 20px; font-weight: bold; }
  #info { margin-top: 5px; color: #bbb; font-size: 13px; }
  #propagation-box {
    background: #23272b; border-radius: 8px; margin: 10px 0 10px 0; padding: 10px 10px 10px 18px; color: #fff; border-left: 6px solid #FFD700;
  }
  #propagation-box.good  { border-left: 6px solid #00e676; }
  #propagation-box.medium { border-left: 6px solid #FFD700; }
  #propagation-box.bad    { border-left: 6px solid #ef5350; }
  #propagation-box.undef  { border-left: 6px solid #999; }
  .legend {
    font-size: 13px; margin-top: 10px; padding: 6px; background: #262626; border-radius: 6px;
  }
  .legend span { display: inline-block; width: 16px; height: 16px; margin-right: 6px; border-radius: 8px; vertical-align: middle;}
</style>
</head>
<body>
<div id="sidebar">
  <h2>CONTEST ANALYSE BY ON1DA</h2>
  <input type="text" id="qraLocator" placeholder="Entrer le QRA-Locator de la station (ex : JO20DJ)" maxlength="6" autocomplete="off" />
  <input type="file" id="adifFile" accept=".adi,.adif" disabled />
  <button id="analyzeBtn" disabled>Analyser et afficher</button>
  <select id="bandSelect">
    <option value="">Toutes bandes</option>
    <option value="160M">160m</option>
    <option value="80M">80m</option>
    <option value="60M">60m</option>
    <option value="40M">40m</option>
    <option value="30M">30m</option>
    <option value="20M">20m</option>
    <option value="17M">17m</option>
    <option value="15M">15m</option>
    <option value="12M">12m</option>
    <option value="10M">10m</option>
    <option value="6M">6m</option>
    <option value="4M">4m</option>
    <option value="2M">2m</option>
    <option value="70CM">70cm</option>
    <option value="VHF">VHF</option>
    <option value="UHF">UHF</option>
  </select>

  <div id="propagation-box" class="undef">
    <b>Indice Kp (GFZ) :</b> <span id="kp-value">–</span>
    <span id="kp-status"></span>
  </div>
  
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>
  
  <p id="info"></p>
  <div id="timeline-container" style="margin-top:10px;"></div>
  
  <div class="legend">
    <b>Légende Kp :</b><br>
    <span style="background:#00e676"></span> Bon (Kp &lt; 3)<br>
    <span style="background:#FFD700"></span> Moyen (Kp 3-5)<br>
    <span style="background:#ef5350"></span> Mauvais (Kp &gt;= 5)
  </div>
  
</div>
<div id="map" style="height:100vh;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ... (ton code de QRA locator, parsing ADIF, Leaflet, affichage markers, timeline, etc. reste inchangé)
  // Pour simplifier ici on ne recopie pas tout, focus sur la partie Kp

  // Exemple simple de récupération Kp via GFZ
  async function fetchKpGFZ(dateStr) {
    try {
      const url = `https://kp.gfz-potsdam.de/kpdata?startdate=${dateStr}&enddate=${dateStr}&format=json`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const json = await resp.json();
      // Exemple json.result[0].kpindex valeur moyenne du jour
      if(json && json.result && json.result.length > 0) {
        // Prenons la moyenne Kp du jour (ou 1ere valeur)
        return parseFloat(json.result[0].kpindex);
      }
      return null;
    } catch(e) {
      console.error('Erreur récupération Kp GFZ:', e);
      return null;
    }
  }

  // Mise à jour affichage avec état couleur
  async function updatePropagationBoxForDate(dateStr) {
    const kp = await fetchKpGFZ(dateStr);
    const kpValElem = document.getElementById('kp-value');
    const kpStatusElem = document.getElementById('kp-status');
    const box = document.getElementById('propagation-box');
    if(kp === null || isNaN(kp)) {
      kpValElem.textContent = '–';
      kpStatusElem.textContent = 'Indisponible';
      box.className = 'undef';
      return;
    }
    kpValElem.textContent = kp.toFixed(1);
    let status = '';
    if(kp < 3) {
      status = 'Bonne';
      box.className = 'good';
    } else if(kp < 5) {
      status = 'Moyenne';
      box.className = 'medium';
    } else {
      status = 'Mauvaise';
      box.className = 'bad';
    }
    kpStatusElem.textContent = `(${status})`;
  }

  // Exemple d'intégration avec la timeline (dans ton updateTimelineMap)
  async function updateTimelineMap() {
    const idx = Number(timelineRange.value) || 0;
    const curQSO = timelineQSOs[idx];
    if(!curQSO) return;
    
    timelineLabel.textContent = curQSO.datetime.toISOString().replace("T"," ").substring(0,16);
    
    // Filtrage QSOs comme avant...
    const visible = timelineQSOs.slice(0, idx+1);
    const band = bandSelect.value;
    let filtered;
    if(!band) filtered = visible;
    else if(band === "VHF") filtered = visible.filter(q => ["2M","4M","6M"].includes(q.band));
    else if(band === "UHF") filtered = visible.filter(q => ["70CM"].includes(q.band));
    else filtered = visible.filter(q => q.band === band);
    markersLayer.clearLayers();
    displayMarkers(filtered);

    // Mise à jour des indices de propagation via GFZ
    await updatePropagationBoxForDate(curQSO.date);
  }

  // ... réintègre dans ton flow analyseBtn, timelineRange, bandSelect, etc.

</script>
</body>
</html>
