  function extractDatesFromQSOs(qsos) {
    const dates = qsos
      .map(q => q.date)
      .filter(d => d && d !== "N/A");

    if (dates.length === 0) return null;

    const formatted = dates.map(d =>
      `${d.substring(0,4)}-${d.substring(4,6)}-${d.substring(6,8)}`
    );

    formatted.sort();

    return {
      min: formatted[0],
      max: formatted[formatted.length - 1]
    };
  }

  async function fetchPropagation(minDate, maxDate) {
    const url = `https://kp.gfz.de/kpdata?startdate=${minDate}&enddate=${maxDate}&format=kp1`;

    try {
      const response = await fetch(url);
      if (!response.ok) throw new Error("Erreur API propagation");

      return await response.json();
    } catch (e) {
      console.error("Erreur propagation :", e);
      return null;
    }
  }

  function evaluatePropagation(kp) {
    if (kp <= 2) return {text: "Bonne propagation", color: "lime"};
    if (kp <= 4) return {text: "Propagation moyenne", color: "orange"};
    return {text: "Mauvaise propagation", color: "red"};
  }

  function displayPropagation(data) {
    const box = document.getElementById("propagationStatus");

    if (!data || !data.length) {
      box.innerHTML = "Impossible de récupérer les indices.";
      box.style.color = "red";
      return;
    }

    const last = data[data.length - 1];

    const K = last.K || "?";
    const Kp = last.Kp || "?";
    const A = last.A || "?";

    const evalP = evaluatePropagation(Kp);

    box.innerHTML = `
      <b>K :</b> ${K}<br>
      <b>Kp :</b> ${Kp}<br>
      <b>A :</b> ${A}<br><br>
      <span style="color:${evalP.color}; font-weight:bold;">${evalP.text}</span>
    `;
  }
